<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TurnosWeb — Cuadrante Público</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flatpickr.min.css">
  
  <!-- PWA & Mobile Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1d21">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="Logo.png">
  <style>
      :root {
          --bg: #eef2f6;
          --toolbar-bg: rgba(255, 255, 255, 0.92);
          --surface: #ffffff;
          --surface-soft: #f6f9fc;
          --border: #d7dee8;
          --grid: #d6dde6;
          --text: #0c2138;
          --text-dim: #64748b;
          --accent: #1f4f82;
          --accent-soft: #e2eefb;
          --mint-bg: #d8efda;
          --mint-text: #0b6044;
          --amber-bg: #ffefbd;
          --amber-text: #9d6a00;
          --rose-bg: #ffb3b3;
          --rose-text: #ffffff;
          --slate-bg: #e7ebef;
          --slate-text: #223247;
          --cyan-bg: #ccecf7;
          --cyan-text: #075a74;
          --toolbar-shadow: 0 10px 30px rgba(12, 33, 56, 0.08);
      }

      body.night-mode {
          --bg: #0f1724;
          --toolbar-bg: rgba(15, 23, 36, 0.9);
          --surface: #132033;
          --surface-soft: #18283d;
          --border: #28405b;
          --grid: #29415c;
          --text: #e5edf6;
          --text-dim: #9db1c7;
          --accent: #84b8ff;
          --accent-soft: rgba(132, 184, 255, 0.18);
          --mint-bg: #183d31;
          --mint-text: #bdebd0;
          --amber-bg: #473811;
          --amber-text: #ffe19a;
          --rose-bg: #ffb3b3;
          --rose-text: #ffffff;
          --slate-bg: #243345;
          --slate-text: #d8e3ef;
          --cyan-bg: #173a45;
          --cyan-text: #afe7f5;
          --toolbar-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
      }

      * { box-sizing: border-box; }

      body {
          background:
              radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 22%),
              linear-gradient(180deg, #f7f9fb 0%, var(--bg) 100%);
          font-family: 'Manrope', sans-serif;
          color: var(--text);
          margin: 0;
          min-height: 100vh;
      }

      svg { max-width: 100%; height: auto; }
      .flatpickr-calendar svg { width: 14px; height: 14px; }

      .site-toolbar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 0 28px;
          height: 78px;
          background: var(--toolbar-bg);
          color: var(--text);
          position: sticky;
          top: 0;
          z-index: 1000;
          backdrop-filter: blur(14px);
          border-bottom: 1px solid rgba(215, 222, 232, 0.9);
          box-shadow: var(--toolbar-shadow);
      }

      .toolbar-brand { display: flex; flex-direction: column; }
      .toolbar-title {
          font-weight: 800;
          font-size: 1.18rem;
          line-height: 1.05;
          letter-spacing: -0.03em;
      }
      .toolbar-subtitle {
          font-size: 0.72rem;
          font-weight: 700;
          letter-spacing: 0.08em;
          color: var(--text-dim);
          text-transform: uppercase;
      }

      .toolbar-controls { display: flex; align-items: center; gap: 10px; }
      .toolbar-controls > div:first-child {
          display: flex;
          background: #f8fafc !important;
          border-radius: 999px !important;
          padding: 4px !important;
          border: 1px solid var(--border) !important;
      }

      .btn-nav, .toolbar-select, .toolbar-date {
          background: #ffffff;
          border: 1px solid var(--border);
          color: var(--text);
          padding: 8px 14px;
          border-radius: 12px;
          font-size: 0.83rem;
          font-weight: 700;
          cursor: pointer;
          outline: none;
          box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
      }
      .toolbar-controls > div:first-child .btn-nav {
          border: none !important;
          background: transparent !important;
          box-shadow: none !important;
      }
      .toolbar-controls > div:first-child .btn-nav:nth-child(2) {
          background: #ffffff !important;
          border-radius: 999px !important;
          border-left: 1px solid var(--border) !important;
          border-right: 1px solid var(--border) !important;
      }
      .toolbar-select { min-width: 160px; }
      .toolbar-date { width: 178px; text-align: center; }

      .btn-request {
          background: var(--accent);
          color: #ffffff;
          padding: 10px 18px;
          border-radius: 999px;
          font-weight: 800;
          text-decoration: none;
          font-size: 0.85rem;
          margin-left: 10px;
          display: flex; align-items: center; gap: 6px;
          box-shadow: 0 8px 20px rgba(31, 79, 130, 0.18);
      }

      .public-main { padding: 22px 0 34px; }
      
      .hotel-card {
          background: var(--surface);
          margin: 0 auto 24px;
          max-width: 96%;
          border-radius: 18px;
          border: 1px solid var(--border);
          box-shadow: 0 18px 44px rgba(12, 33, 56, 0.06);
          overflow: hidden;
      }

      .hotel-header {
          padding: 26px 28px 16px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          background: linear-gradient(180deg, var(--surface-soft) 0%, var(--surface) 100%);
      }
      .hotel-heading {
          display: flex;
          align-items: center;
          gap: 16px;
      }
      .hotel-logo {
          width: 56px; height: 56px;
          border: 1px solid var(--border);
          border-radius: 14px;
          display: flex; align-items: center; justify-content: center;
          padding: 6px; background: #fff;
          box-shadow: 0 10px 24px rgba(12, 33, 56, 0.08);
      }
      .hotel-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }

      .hotel-info h2 {
          margin: 0;
          font-size: 1.14rem;
          font-weight: 800;
          letter-spacing: -0.02em;
          text-transform: uppercase;
      }
      .hotel-info .week-label {
          font-size: 0.82rem;
          font-weight: 800;
          color: var(--accent);
          text-transform: uppercase;
          margin-top: 4px;
      }
      .header-mode {
          display: inline-flex;
          align-items: center;
          gap: 4px;
          padding: 4px;
          border: 1px solid var(--border);
          border-radius: 999px;
          background: rgba(255,255,255,0.55);
      }
      .mode-btn {
          border: none;
          background: transparent;
          color: var(--text-dim);
          padding: 8px 12px;
          border-radius: 999px;
          font: inherit;
          font-size: 0.75rem;
          font-weight: 800;
          cursor: pointer;
      }
      .mode-btn.active {
          background: var(--accent-soft);
          color: var(--accent);
      }

      .hotel-card > .viewport { padding: 0 22px 22px; }
      .hotel-card > .viewport > .viewport {
          height: var(--public-table-height, 70vh) !important;
          min-height: 0 !important;
          max-height: 70vh !important;
          background: linear-gradient(180deg, var(--surface-soft) 0%, var(--surface) 100%) !important;
          border: 1px solid var(--grid) !important;
          border-radius: 12px !important;
          box-shadow: none !important;
      }
      
      .preview-table-v2 {
          width: 100%;
          border-collapse: collapse !important;
          border-spacing: 0 !important;
          table-layout: auto;
      }
      
      .preview-table-v2 th {
          background: var(--accent-soft) !important;
          padding: 16px 8px 14px !important;
          text-align: center;
          font-weight: 700;
          color: var(--text-dim);
          text-transform: capitalize;
          font-size: 0.72rem;
          border: 1px solid var(--grid);
          vertical-align: middle;
      }

      .preview-table-v2 td {
          padding: 10px 8px !important;
          border: 1px solid var(--grid);
          vertical-align: middle;
          background: var(--surface);
      }

      .emp-cell {
          width: 220px;
          min-width: 220px;
          padding-left: 0 !important;
          background: var(--surface);
          position: sticky;
          left: 0;
          z-index: 10;
      }
      .employee-head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
      }
      
      .employee-name {
          font-weight: 700;
          color: var(--text);
          font-size: 1rem;
          line-height: 1.15;
      }
      
      .emp-badges { display: flex; gap: 6px; flex-shrink: 0; }
      
      .badge {
          display: inline-flex;
          align-items: center;
          gap: 3px;
          padding: 4px 10px;
          border-radius: 999px;
          background: var(--surface);
          color: var(--text-dim);
          font-size: 0.74rem;
          font-weight: 700;
          border: 1px solid var(--border);
      }
      
      .badge-icon { font-size: 0.85rem; }

      .turno-pill {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 8px 12px;
          border-radius: 999px;
          font-weight: 700;
          font-size: 0.82rem;
          min-width: 92px;
          width: auto;
          max-width: 100%;
          gap: 6px;
          margin: 0 auto;
          border: 1px solid transparent;
          box-shadow: inset 0 -1px 0 rgba(255,255,255,0.4);
      }

      .v-m, .v-manana { background: var(--mint-bg); color: var(--mint-text); border-color: #c7e5ca; }
      .v-t, .v-tarde { background: var(--amber-bg); color: var(--amber-text); border-color: #f3df9b; }
      .v-n, .v-noche { background: var(--slate-bg); color: var(--slate-text); border-color: #d8dee5; }
      .v-d, .v-descanso { background: #fee2e2 !important; color: #991b1b !important; border: 1px solid #fecaca !important; }
      .v-p, .v-partido { background: #fef9c3 !important; color: #854d0e !important; border: 1px solid #fde047 !important; }
      .v-v, .v-vac {
          background: #e8f9ff;
          color: #0072a7;
          border-color: #aee6ff;
      }
      .v-baja { background: #f3e8ff !important; color: #581c87 !important; border-color: #d8b4fe !important; }
      .v-perm, .v-permiso { background: #fdf4ff !important; color: #701a75 !important; border-color: #f5d0fe !important; }

      .icon-sync { font-size: 0.7rem; color: inherit; opacity: 0.85; }
      .icon-moon { font-size: 0.78rem; color: #d48a00; }
      .icon-vac { font-size: 0.82rem; }
      .empty-dash {
          color: #c0c8d2;
          font-weight: 600;
          text-align: center;
          display: block;
          font-size: 1.05rem;
      }

      .preview-table-v2 tr:hover td { background: var(--surface-soft); }
      .preview-table-v2 tr:hover .emp-cell { background: var(--surface-soft); }
      .preview-table-v2 th:first-child,
      .preview-table-v2 td:first-child { border-left: 1px solid var(--grid); }
      .preview-table-v2 th:first-child {
          width: 220px !important;
          min-width: 220px !important;
          background: var(--accent-soft) !important;
      }
      .preview-table-v2 th.today > div:last-child { color: var(--accent); }
      .preview-table-v2 th.weekend { background: color-mix(in srgb, var(--accent-soft) 62%, var(--surface) 38%) !important; }

      .night-summary {
          width: min(1120px, calc(100% - 44px));
          margin: 0 auto;
          padding: 4px 0 12px;
      }
      .night-summary-title {
          margin: 0 0 16px;
          font-size: 1.12rem;
          font-weight: 800;
          color: var(--text);
      }
      .night-month {
          margin: 0 0 22px;
      }
      .night-month h3 {
          margin: 0 0 12px;
          font-size: 1.4rem;
          font-weight: 800;
          color: var(--text);
          text-transform: lowercase;
      }
      .night-month-days {
          font-size: 0.78rem;
          font-weight: 700;
          color: var(--text-dim);
          margin-left: 8px;
          white-space: nowrap;
      }
      .night-hotel-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
          gap: 16px;
          align-items: start;
      }
      .night-hotel {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 14px 30px rgba(12, 33, 56, 0.06);
      }
      .night-table {
          width: 100%;
          border-collapse: collapse;
          table-layout: fixed;
      }
      .night-table th,
      .night-table td {
          border: 1px solid var(--grid);
          padding: 14px 16px;
          background: var(--surface);
      }
      .night-table th {
          font-size: 0.95rem;
          font-weight: 700;
          color: var(--accent);
          background: var(--surface-soft);
      }
      .night-table td:last-child,
      .night-table th:last-child {
          width: 118px;
          text-align: center;
      }
      .night-empty {
          padding: 30px;
          text-align: center;
          color: var(--text-dim);
          font-weight: 700;
          border: 1px dashed var(--border);
          border-radius: 16px;
          background: rgba(255,255,255,0.35);
      }

      @media (max-width: 1100px) {
          .site-toolbar {
              height: auto;
              padding: 16px 18px;
              flex-direction: column;
              align-items: flex-start;
              gap: 14px;
          }

          .toolbar-controls {
              width: 100%;
              flex-wrap: wrap;
          }

          .hotel-card > .viewport {
              padding: 0 12px 14px;
          }

          .emp-cell,
          .preview-table-v2 th:first-child {
              width: 220px !important;
              min-width: 220px !important;
          }
      }
  </style>
</head>
<body>
  <div class="site-toolbar">
    <div class="toolbar-brand">
      <div class="toolbar-title">Cuadrantes de turnos Recepción</div>
      <div class="toolbar-subtitle">Sercotel Guadiana / Cumbria Spa&Hotel</div>
    </div>
    <div class="toolbar-controls">
      <div style="display:flex; background:#2a2e35; border-radius:8px; padding:2px; border:1px solid #3b4048;">
        <button class="btn-nav" style="border:none; background:transparent;" onclick="changeWeek(-1)">← Semana</button>
        <button class="btn-nav" style="border:none; background:transparent; border-left:1px solid #3b4048; border-right:1px solid #3b4048;" onclick="goToday()">Hoy</button>
        <button class="btn-nav" style="border:none; background:transparent;" onclick="changeWeek(1)">semana →</button>
      </div>
      <select id="hotelSelect" class="toolbar-select" onchange="renderPublicView()">
      </select>
      <input type="text" id="dateRange" class="toolbar-date" readonly>
      <a href="solicitud.html" class="btn-request">
        <span>🔄 Solicitar Cambio</span>
      </a>
    </div>
  </div>

  <div id="publicContainer" class="public-main"></div>

  <script src="flatpickr.js"></script>
  <script src="flatpickr_es.js"></script>
  <script src="supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-dao.js"></script>
  <script src="turnos-rules.js?v=13.30"></script>
  <script src="virtualizer.js"></script>
  <script>
    let _picker;
    let _publicRealtimeChannel = null;
    let _publicRefreshTimer = null;
    const $ = s => document.querySelector(s);
    const escapeHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // ── Auto-refresh configuración ────────────────────────────────────────────
    // Auto-refresh público cada 15 minutos para evitar interrupciones de lectura.
    const PUBLIC_AUTO_REFRESH_MS = window.__DEBUG_REFRESH_MS || (15 * 60 * 1000);
    const USER_IDLE_THRESHOLD_MS = 60 * 1000; // No refrescar si el usuario estuvo activo en el último minuto
    let _lastUserInteractionAt = Date.now();
    let _publicPeriodicTimer = null;
    // ─────────────────────────────────────────────────────────────────────────
    const formatDisplayName = (name) => {
        if (!name) return '';
        return name.replace(/_DUP_.*$/, '').replace(/_CT$/, '').replace(/_/g, ' ').trim();
    };
    const monthNamesFull = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    const formatDateLocal = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    const isNightCode = (value) => String(value || '').toUpperCase().startsWith('N');

    function accumulateNightSummary(summaryByMonth, hotelName, employeeName, fecha) {
        const dt = new Date(`${fecha}T12:00:00`);
        const monthKey = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        if (!summaryByMonth.has(monthKey)) summaryByMonth.set(monthKey, new Map());
        const hotels = summaryByMonth.get(monthKey);
        if (!hotels.has(hotelName)) hotels.set(hotelName, new Map());
        const employees = hotels.get(hotelName);
        employees.set(employeeName, (employees.get(employeeName) || 0) + 1);
    }

    function getSelectedDaysInMonth(year, month, rangeStart, rangeEnd) {
        const monthStart = new Date(year, month - 1, 1, 12);
        const monthEnd = new Date(year, month, 0, 12);
        const selectedStart = new Date(`${rangeStart}T12:00:00`);
        const selectedEnd = new Date(`${rangeEnd}T12:00:00`);
        const start = selectedStart > monthStart ? selectedStart : monthStart;
        const end = selectedEnd < monthEnd ? selectedEnd : monthEnd;
        if (end < start) return 0;
        return Math.round((end - start) / 86400000) + 1;
    }

    function renderNightSummary(container, summaryByMonth, hasRows, rangeStart, rangeEnd) {
        const section = document.createElement('section');
        section.className = 'night-summary';

        if (!hasRows || !summaryByMonth.size) {
            section.innerHTML = `
                <h2 class="night-summary-title">Resumen de noches</h2>
                <div class="night-empty">No hay noches en el periodo seleccionado.</div>
            `;
            container.appendChild(section);
            return;
        }

        let html = '<h2 class="night-summary-title">Resumen de noches</h2>';
        [...summaryByMonth.entries()].sort((a, b) => a[0].localeCompare(b[0])).forEach(([monthKey, hotels]) => {
            const [year, month] = monthKey.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const selectedDays = getSelectedDaysInMonth(year, month, rangeStart, rangeEnd);
            html += `<div class="night-month"><h3>${monthNamesFull[month - 1]} de ${year}<span class="night-month-days">(${selectedDays} de ${daysInMonth} días)</span></h3><div class="night-hotel-grid">`;

            [...hotels.entries()].sort((a, b) => a[0].localeCompare(b[0], 'es')).forEach(([hotelName, employees]) => {
                const rows = [...employees.entries()]
                    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'es'))
                    .map(([employeeName, total]) => `
                        <tr>
                            <td>${escapeHtml(employeeName)}</td>
                            <td>${total}</td>
                        </tr>
                    `).join('');

                html += `
                    <div class="night-hotel">
                        <table class="night-table">
                            <thead>
                                <tr>
                                    <th>${escapeHtml(hotelName)}</th>
                                    <th>Noches</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            });

            html += '</div></div>';
        });

        section.innerHTML = html;
        container.appendChild(section);
    }

    function applyTheme(theme) {
        document.body.classList.toggle('night-mode', theme === 'night');
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === theme);
        });
        localStorage.setItem('public-theme', theme);
    }

    window.setVisualTheme = (theme) => applyTheme(theme);

    // Captura el estado actual de navegación para preservarlo tras un refresco silencioso
    function _capturePublicState() {
        return {
            scrollY: window.scrollY,
            mainScrollTop: document.querySelector('.public-main')?.scrollTop || 0,
            hotel: $('#hotelSelect')?.value || '',
            weekStart: _picker?.selectedDates?.[0] ? formatDateLocal(_picker.selectedDates[0]) : '',
            theme: localStorage.getItem('public-theme') || 'day'
        };
    }

    // Restaura el estado capturado después de un refresco silencioso
    function _restorePublicState(state) {
        if (!state) return;
        // Restaurar hotel
        const sel = $('#hotelSelect');
        if (sel && state.hotel !== undefined && sel.value !== state.hotel) {
            sel.value = state.hotel;
        }
        // Restaurar semana (solo si no la cambió el usuario)
        if (state.weekStart && _picker) {
            const current = _picker.selectedDates?.[0] ? formatDateLocal(_picker.selectedDates[0]) : '';
            if (current !== state.weekStart) {
                const d = new Date(state.weekStart + 'T12:00:00');
                setWeekRange(d);
            }
        }
        // Restaurar scroll después de que el DOM se actualice
        requestAnimationFrame(() => {
            window.scrollTo({ top: state.scrollY, behavior: 'instant' });
            const main = document.querySelector('.public-main');
            if (main && state.mainScrollTop) main.scrollTop = state.mainScrollTop;
        });
    }

    window.renderPublicView = async (opts = {}) => {
        const hotel = $('#hotelSelect').value;
        const range = _picker.selectedDates;
        if (range.length < 2) return;
        const start = formatDateLocal(range[0]);
        const end = formatDateLocal(range[1]);

        const container = $('#publicContainer');
        // Anti-parpadeo: solo mostrar spinner en el primer render (container vacío)
        const isFirstRender = !container.hasChildNodes() || container.dataset.loaded !== '1';
        if (isFirstRender) {
            container.innerHTML = '<div style="padding:100px; text-align:center; font-weight:700; color:#5f6f84;">Cargando cuadrante...</div>';
        }

        const [snapsResult, empleadosResult] = await Promise.all([
            window.TurnosDB.client
                .from('publicaciones_cuadrante')
                .select('*')
                .eq('estado', 'activo')
                .gte('semana_inicio', start)
                .lte('semana_inicio', end)
                .order('semana_inicio', { ascending: true })
                .order('hotel', { ascending: true })
                .order('version', { ascending: false }),
            window.TurnosDB.getEmpleados()
        ]);
        const snaps = snapsResult.data;
        // Índice de perfiles completos por ID para reconciliación y lógica de control
        window._publicProfilesData = {};
        window._publicProfilesIndex = {};
        (empleadosResult || []).forEach(e => {
            const keyId = String(e.id || '').trim();
            const keyNombre = String(e.nombre || '').trim();
            if (keyId) {
                window._publicProfilesIndex[keyId] = e.nombre;
                window._publicProfilesData[keyId] = e;
            }
            if (keyNombre) {
                window._publicProfilesIndex[keyNombre] = e.nombre;
                window._publicProfilesData[keyNombre] = e;
            }
        });

        if (!snaps || snaps.length === 0) {
            container.innerHTML = '<div style="padding:100px; text-align:center; font-weight:700; color:#5f6f84;">No hay cuadrantes publicados desde esta fecha.</div>';
            return;
        }

        container.innerHTML = '';
        container.dataset.loaded = '1';
        
        console.log("[INDEX] weekStart", start);
        console.log("[INDEX] publicaciones recibidas", snaps.length);

        const seen = new Set();
        const selectedByHotel = [];
        snaps.forEach(s => {
            const key = `${s.hotel}_${s.semana_inicio}`;
            if (seen.has(key)) return;
            if (hotel && s.hotel !== hotel) return;
            if (s.hotel.toUpperCase().startsWith('TEST')) return; 
            seen.add(key);
            selectedByHotel.push(s);
        });

        console.log("[INDEX] seleccionadas", selectedByHotel.map(p => ({
            hotel: p.hotel,
            version: p.version,
            estado: p.estado,
            semana_inicio: p.semana_inicio,
            rows: (p.snapshot_json?.rows || p.snapshot_json?.empleados)?.length
        })));

        if (selectedByHotel.length > 0) {
            const firstRow = (selectedByHotel[0].snapshot_json?.rows || selectedByHotel[0].snapshot_json?.empleados)?.[0];
            const cells = firstRow?.turnosOperativos || firstRow?.cells || firstRow?.dias || {};
            console.log("[INDEX] first row", firstRow);
            console.log("[INDEX] first cell keys", Object.keys(cells));
        }

        container.innerHTML = '';
        container.dataset.loaded = '1';
        
        const summaryByMonth = new Map();
        let hasRows = false;
        selectedByHotel.forEach(s => {
            hasRows = true;
            renderHotelSection(container, s, start, end, summaryByMonth);
        });
        renderNightSummary(container, summaryByMonth, hasRows, start, end);
        applyTheme(localStorage.getItem('public-theme') || 'day');
        _lastPublicRenderTime = Date.now();
        // Si fue un refresco silencioso, restaurar posición de scroll
        if (opts._savedState) {
            _restorePublicState(opts._savedState);
        }
    };

    function renderHotelSection(container, snap, rangeStart, rangeEnd, summaryByMonth) {
        const div = document.createElement('div');
        div.className = 'hotel-card';
        const logoUrl = snap.hotel.includes('Sercotel') ? 'guadiana logo.jpg' : 'cumbria logo.jpg';
        const formattedWeek = snap.semana_inicio.split('-').reverse().join('/');

        div.innerHTML = `
            <div class="hotel-header">
                <div class="hotel-heading">
                    <div class="hotel-logo"><img src="${logoUrl}"></div>
                    <div class="hotel-info">
                        <h2>${snap.hotel}</h2>
                        <div class="week-label">SEMANA DEL ${formattedWeek}</div>
                    </div>
                </div>
                <div class="header-mode">
                    <button type="button" class="mode-btn" data-theme="day" onclick="setVisualTheme('day')">Día</button>
                    <button type="button" class="mode-btn" data-theme="night" onclick="setVisualTheme('night')">Noche</button>
                </div>
            </div>
            <div class="viewport"></div>
        `;
        container.appendChild(div);
        
        const viewport = div.querySelector('.viewport');
        const rows = snap.snapshot_json.rows || snap.snapshot_json.empleados || [];
        
        const dates = [];
        let d = new Date(snap.semana_inicio + 'T12:00:00');
        for(let i=0; i<7; i++){
            dates.push(formatDateLocal(d));
            d.setDate(d.getDate()+1);
        }

        const days = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
        const todayKey = formatDateLocal(new Date());
        const columns = dates.map((f, idx) => {
            const dt = new Date(f + 'T12:00:00');
            return {
                title: days[dt.getDay()],
                subtitle: `${dt.getDate()}/${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][dt.getMonth()]}/${String(dt.getFullYear()).slice(-2)}`,
                dbFecha: f,
                width: 140,
                isWeekend: dt.getDay() === 0 || dt.getDay() === 6,
                isToday: f === todayKey
            };
        });

        const table = new window.VirtualTable(viewport, { columns, rowHeight: 62 });

        table.renderCellContent = function(cell, data, rowData, fecha) {
            // V12.6 FIX: también revisar label como fallback antes de mostrar "—"
            // Snapshots publicados con code='' pero label='Tarde' deben renderizarse correctamente
            const _cellCode = String(data?.code || '').trim();
            const _cellLabel = String(data?.label || '').trim();
            const _cellTurno = String(data?.turno || '').trim();
            const _hasContent = (_cellCode && _cellCode !== '—') || (_cellLabel && _cellLabel !== '—') || (_cellTurno && _cellTurno !== '—');
            if (!data || !_hasContent) {
                return cell.innerHTML = '<span class="empty-dash">—</span>';
            }
            const context = {
                view: 'index',
                hotel: snap.hotel,
                weekStart: snap.semana_inicio
            };
            const display = window.TurnosRules.getPublicCellDisplay(data, { compact: false }, rowData, context);
            // V12.6 FIX: usar display.label como fuente de color cuando code está vacío
            const _codeForCls = data.code || data.label || data.turno || display.label || '';
            const cls = window.TurnosRules.shiftKey(_codeForCls, data.type);
            
            cell.innerHTML = '';
            const pill = document.createElement('div');
            pill.className = `turno-pill v-${cls}`;
            pill.textContent = display.label;
            
            if (display.icons) {
                const currentText = pill.textContent;
                display.icons.forEach(icon => {
                    if (currentText.includes(icon)) return; // Evitar duplicado si ya está en el label
                    
                    if (icon === '\u{1F504}' || icon === '🔄') {
                        pill.innerHTML += ' <span class="icon-sync">\u{1F504}</span>';
                    } else if (icon === '\u{1F4CC}' || icon === '📌') {
                        pill.innerHTML += ' <span class="icon-pin">\u{1F4CC}</span>';
                    } else if (icon === '\u{1F3D6}\u{FE0F}' || icon === '🏖️') {
                        pill.innerHTML += ' <span class="icon-vac">\u{1F3D6}\u{FE0F}</span>';
                    } else if (icon === '\u{1F319}' || icon === '🌙') {
                        pill.innerHTML += ' <span class="icon-moon">\u{1F319}</span>';
                    } else {
                        pill.innerHTML += ` <span>${icon}</span>`;
                    }
                });
            }
            cell.appendChild(pill);
        };

        table.renderRow = function(tr, rowData) {
            const tds = tr.children;
            const daysMap = rowData.turnosOperativos || rowData.cells || rowData.dias || {};
            
            // Reconciliación de perfil: Mergear metadatos del perfil (tipo, rol, etc.) si existen
            const empIdForData = String(rowData.empleado_id || rowData.nombre || '').trim();
            const profileData = (window._publicProfilesData || {})[empIdForData];
            if (profileData) {
                // V12.8 FIX: Priorizar "apoyo" del perfil sobre "fijo" del snapshot si existe conflicto
                const pTipo = (profileData.tipo || profileData.tipo_personal || "").toLowerCase();
                if (pTipo.includes('apoyo')) {
                    rowData.tipo = pTipo;
                } else {
                    rowData.tipo = rowData.tipo || rowData.tipo_personal || rowData.tipoPersonal || profileData.tipo || profileData.tipo_personal;
                }
                
                rowData.rol = rowData.rol || rowData.rol_operativo || rowData.rolOperativo || profileData.rol || profileData.rol_operativo;
                rowData.puesto = rowData.puesto || rowData.categoria || profileData.puesto || profileData.categoria;
                rowData.categoria = rowData.categoria || profileData.categoria;
                rowData.activo = (rowData.activo !== undefined) ? rowData.activo : profileData.activo;
            }

            const showCounters = window.TurnosRules ? window.TurnosRules.shouldShowNightRestControls(rowData, { 
                view: 'index',
                hotel: snap.hotel,
                weekStart: snap.semana_inicio
            }) : true;
            const skipCounters = !showCounters;
            let nights = 0, rests = 0;
            if (!skipCounters) {
                dates.forEach(f => {
                    const d = daysMap[f] || {};
                    const c = (d.code || '').toUpperCase();
                    if (c.startsWith('N')) nights++;
                    if (c === 'D' || c === 'DESCANSO') rests++;
                });
            }

            const isAbsent = rowData.rowType === 'ausencia_informativa' || rowData.rowType === 'ausente_info';
            const profilesIdx = window._publicProfilesIndex || {};
            const empId = String(rowData.empleado_id || rowData.nombre || '').trim();
            const resolvedName = profilesIdx[empId] || rowData.nombreVisible || rowData.nombre || 'Empleado';
            const displayName = formatDisplayName(resolvedName);

            tds[0].innerHTML = `
                <div class="emp-cell ${isAbsent ? 'ausencia-row' : ''}">
                    <div class="employee-head">
                        <div class="employee-name">${escapeHtml(displayName)}</div>
                    ${isAbsent || skipCounters ? '' : `
                    <div class="emp-badges">
                        <span class="badge"><span class="badge-icon">🌙</span> ${nights}</span>
                        <span class="badge">D ${rests}</span>
                    </div>
                    `}
                    </div>
                </div>
            `;

            dates.forEach((f, i) => {
                table.renderCellContent(tds[i+1], daysMap[f], rowData, f);
            });
        };

        const filteredRows = rows.filter(r => {
            const name = String(r.nombre || r.nombreVisible || '').trim();
            if (!name || name === '—') return false; // V12.8: Eliminar filas sin personal

            const isVisible = window.TurnosRules.isPublicEmployeeVisible(r);
            
            if (window.DEBUG_MODE && (name.includes('Próximamente') || name.includes('VACANTE'))) {
                console.log('[PUBLIC_ROW_FILTER]', {
                    view: 'index',
                    hotel: snap.hotel,
                    weekStart: snap.semana_inicio,
                    empleado: name,
                    renderPublic: isVisible,
                    reason: isVisible ? 'operational_substitute_visible' : 'internal_placeholder_hidden'
                });
            }
            return isVisible;
        });
        const sorted = window.TurnosRules.sortEmployees(filteredRows);

        sorted.forEach(rowData => {
            const showCounters = window.TurnosRules ? window.TurnosRules.shouldShowNightRestControls(rowData, { view: 'index' }) : true;
            if (!showCounters) return;
            const daysMap = rowData.dias || rowData.cells || {};
            dates.forEach(f => {
                const dayData = daysMap[f] || {};
                const code = String(dayData.code || dayData.turno || '').toUpperCase();
                if (f >= rangeStart && f <= rangeEnd && isNightCode(code)) {
                    accumulateNightSummary(summaryByMonth, snap.hotel, formatDisplayName(rowData.nombreVisible || rowData.nombre || 'Pendiente'), f);
                }
            });
        });

        const headerHeight = 64;
        const scrollbarHeight = 18;
        const contentHeight = headerHeight + (sorted.length * 62) + scrollbarHeight + 2;
        const maxHeight = Math.floor(window.innerHeight * 0.7);
        const tableHeight = Math.min(contentHeight, maxHeight);
        table.viewport.style.setProperty('height', `${tableHeight}px`, 'important');
        table.viewport.style.setProperty('min-height', '0', 'important');
        table.viewport.style.setProperty('max-height', '70vh', 'important');
        table.setData(sorted);
        requestAnimationFrame(() => {
            if (sorted.length > table.rowPool.length) return;
            const renderedHeight = Math.ceil(table.tableWrap.getBoundingClientRect().height);
            const needsHorizontalScroll = table.viewport.scrollWidth > table.viewport.clientWidth;
            const fittedHeight = renderedHeight + (needsHorizontalScroll ? scrollbarHeight : 0) + 2;
            table.viewport.style.setProperty('height', `${Math.min(fittedHeight, maxHeight)}px`, 'important');
            table.onScroll();
        });
    }

    window.changeWeek = (delta) => {
        const current = _picker.selectedDates[0] || new Date();
        current.setDate(current.getDate() + (delta * 7));
        setWeekRange(current);
        window.renderPublicView();
    };

    function setWeekRange(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const monday = new Date(d.setDate(diff));
        monday.setHours(12, 0, 0, 0);
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        _picker.setDate([monday, sunday]);
    }

    window.goToday = () => {
        setWeekRange(new Date());
        window.renderPublicView();
    };

    // Refresco reactivo (disparado por cambio DB o storage): inmediato, sin preservar estado
    function schedulePublicRefresh() {
        if (_publicRefreshTimer) clearTimeout(_publicRefreshTimer);
        _publicRefreshTimer = setTimeout(() => {
            window.renderPublicView();
        }, 250);
    }

    // Refresco silencioso periódico: preserva scroll, semana, hotel y tema
    function _silentPeriodicRefresh() {
        const idleMs = Date.now() - _lastUserInteractionAt;
        if (idleMs < USER_IDLE_THRESHOLD_MS) {
            console.log('[PUBLIC_REFRESH] Usuario activo, refresco pospuesto.');
            return;
        }
        console.log('[PUBLIC_REFRESH] Refrescando datos sin recargar página.');
        const savedState = _capturePublicState();
        console.log('[PUBLIC_REFRESH] Estado preservado', savedState);
        window.renderPublicView({ _savedState: savedState });
    }

    function _startPeriodicRefresh() {
        if (_publicPeriodicTimer) clearInterval(_publicPeriodicTimer);
        _publicPeriodicTimer = setInterval(() => {
            if (!document.hidden) _silentPeriodicRefresh();
        }, PUBLIC_AUTO_REFRESH_MS);
        console.log('[PUBLIC_REFRESH] Auto-refresh configurado cada 15 minutos.');
    }

    function initPublicRealtime() {
        if (_publicRealtimeChannel || !window.supabase) return;
        _publicRealtimeChannel = window.supabase
            .channel('publicaciones_cuadrante_live')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'publicaciones_cuadrante' },
                () => schedulePublicRefresh()
            )
            .subscribe();
    }

    // Rastrear interacción del usuario para posponer auto-refresh si está activo
    ["scroll", "click", "touchstart", "keydown", "change"].forEach(evt => {
        window.addEventListener(evt, () => { _lastUserInteractionAt = Date.now(); }, { passive: true });
    });

    window.addEventListener('storage', (ev) => {
        if (ev.key === 'turnosweb_public_snapshot_updated_at') {
            schedulePublicRefresh();
        }
    });

    // Refresco al volver a la pestaña solo si han pasado al menos 5 minutos desde el último render
    let _lastPublicRenderTime = 0;
    window.addEventListener('focus', () => {
        const now = Date.now();
        if (now - _lastPublicRenderTime > 5 * 60 * 1000) schedulePublicRefresh();
    });
    window.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            const now = Date.now();
            if (now - _lastPublicRenderTime > 5 * 60 * 1000) schedulePublicRefresh();
        }
    });

    document.addEventListener('DOMContentLoaded', async () => {
        const hotelSelect = document.getElementById('hotelSelect');
        if (hotelSelect && window.TurnosRules && window.TurnosRules.getCanonicalHotels) {
            hotelSelect.innerHTML = window.TurnosRules.getCanonicalHotels().map(h => `<option value="${h.value === 'ALL' ? '' : escapeHtml(h.value)}">${escapeHtml(h.label)}</option>`).join('');
        }
        applyTheme(localStorage.getItem('public-theme') || 'day');
        _picker = flatpickr("#dateRange", {
            mode: "range",
            dateFormat: "Y-m-d",
            locale: { ...flatpickr.l10ns.es, firstDayOfWeek: 1 },
            onChange: () => window.renderPublicView()
        });
        initPublicRealtime();
        _startPeriodicRefresh();
        window.goToday();
    });
  </script>
  <script>
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      navigator.serviceWorker.register('sw.js?v=13.30').catch(err => console.log("SW Error:", err));
    }
  </script>
