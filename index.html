<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TurnosWeb — Cuadrante Público</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="flatpickr.min.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
      :root {
          --accent: #2563eb;
          --accent-hover: #1d4ed8;
          --border: #dfe6ef;
          --border-soft: #edf1f5;
          --bg: #e2e8f0; /* Fondo algo más oscuro en modo claro */
          --bg2: #ffffff;
          --bg3: #eef2f6;
          --surface: #ffffff;
          --text: #06142d;
          --text-dim: #5f6f84;
          --shadow-sm: 0 8px 22px rgba(15, 23, 42, 0.04);
          --shadow-lg: 0 14px 36px rgba(15, 23, 42, 0.05);
      }

      body.dark-mode {
          --bg: #0f172a;
          --bg2: #1e293b;
          --bg3: #334155;
          --surface: #1e293b;
          --text: #f8fafc;
          --text-dim: #94a3b8;
          --border: #334155;
          --border-soft: #1e293b;
          --shadow-sm: 0 8px 22px rgba(0, 0, 0, 0.2);
          --shadow-lg: 0 14px 36px rgba(0, 0, 0, 0.3);
      }

      * { box-sizing: border-box; }

      body {
          background: var(--bg);
          font-family: 'Inter', -apple-system, system-ui, sans-serif;
          color: var(--text);
          margin: 0;
          min-height: 100vh;
          overflow-x: auto;
      }

      .site-toolbar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 18px;
          min-height: 74px;
          padding: 0 22px 0 36px;
          background: #1a1d21;
          color: #ffffff;
          position: sticky;
          top: 0;
          z-index: 1000;
          border: 2px solid #2a2f36;
          box-shadow: 0 4px 18px rgba(15, 23, 42, 0.2);
      }

      .toolbar-brand {
          display: flex;
          align-items: center;
          gap: 18px;
          min-width: 360px;
      }

      .toolbar-brand img {
          width: 44px;
          height: 44px;
          object-fit: contain;
          border-radius: 9px;
          border: 0;
          background: transparent;
          padding: 0;
          filter: brightness(0) invert(1);
      }

      .toolbar-title {
          font-family: 'Outfit', sans-serif;
          font-size: 1.48rem;
          line-height: 1.05;
          font-weight: 900;
          letter-spacing: 0;
          color: #ffffff;
      }

      .toolbar-subtitle {
          color: #cbd5e1;
          font-size: 0.84rem;
          line-height: 1.1;
          font-weight: 800;
          letter-spacing: 0;
          text-transform: none;
          margin-top: 2px;
      }

      .toolbar-controls {
          display: flex;
          align-items: center;
          justify-content: flex-end;
          gap: 10px;
          flex-wrap: wrap;
      }

      .toolbar-divider {
          width: 1px;
          height: 31px;
          background: rgba(255,255,255,0.12);
          margin: 0 12px;
      }

      .nav-btn,
      .toolbar-select,
      .toolbar-date,
      .request-link {
          min-height: 35px;
          border: 1px solid #3b4048;
          border-radius: 8px;
          font-family: inherit;
          font-size: 0.87rem;
          font-weight: 800;
          text-decoration: none;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
          transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
      }

      .nav-btn {
          min-width: 62px;
          background: #2a2e35;
          color: #ffffff;
          padding: 7px 16px;
          cursor: pointer;
      }

      .toolbar-select,
      .toolbar-date {
          background: #2a2e35;
          color: #ffffff;
          padding: 7px 15px;
          outline: none;
      }

      .toolbar-select { min-width: 185px; }
      .toolbar-date { width: 240px; }

      .request-link {
          min-width: 172px;
          background: var(--accent);
          border-color: var(--accent);
          color: #ffffff;
          padding: 7px 16px;
      }

      .nav-btn:hover,
      .toolbar-select:focus,
      .toolbar-date:focus {
          border-color: var(--accent);
          color: #ffffff;
          background: #313844;
      }

      .request-link:hover {
          background: var(--accent-hover);
          border-color: var(--accent-hover);
      }

      .public-main {
          width: 100%;
          padding: 22px 0 24px;
      }

      .preview-week.week {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 24px;
          margin: 0 0 24px;
          overflow: hidden;
          box-shadow: var(--shadow-lg);
      }

      .preview-week-header.week-head {
          min-height: 122px;
          display: flex;
          align-items: center;
          gap: 18px;
          padding: 24px 40px;
          border-bottom: 1px solid var(--border);
          background: var(--surface);
      }

      .preview-week-header.week-head img {
          width: 68px;
          height: 68px;
          border-radius: 10px;
          object-fit: contain;
          border: 1px solid var(--border);
          padding: 7px;
          background: var(--surface);
      }

      .preview-week-header.week-head h3 {
          margin: 0;
          font-size: 1.42rem;
          font-weight: 900;
          color: var(--text);
          font-family: 'Outfit', sans-serif;
          letter-spacing: 0;
          text-transform: uppercase;
      }

      .viewport {
          border-radius: 20px !important;
          border: 1px solid var(--border) !important;
          box-shadow: var(--shadow-sm) !important;
          min-height: unset !important;
          height: auto !important;
          max-height: 80vh !important;
          overflow-x: auto !important;
          overflow-y: auto !important;
          background: var(--surface) !important;
          margin: 0 40px 30px;
          padding: 0;
      }

      .preview-table-v2 {
          width: 100%;
          min-width: 1200px;
          table-layout: fixed;
          border-collapse: separate !important;
          border-spacing: 0 8px !important;
          background: transparent !important;
          margin-top: -8px; /* Compensar espaciado inicial */
      }

      .preview-table-v2 th {
          height: 50px;
          background: var(--bg3) !important;
          padding: 8px 6px !important;
          border-bottom: 1px solid var(--border) !important;
          border-right: none !important;
          font-weight: 800;
          color: var(--text-dim);
          text-align: center;
      }

      .preview-table-v2 th:first-child,
      .preview-table-v2 td.emp-cell {
          width: 250px !important;
          min-width: 200px !important;
          max-width: 350px !important;
          position: sticky !important;
          left: 0 !important;
          z-index: 10 !important;
          background: var(--surface) !important;
          border-right: 1px solid var(--border) !important;
          overflow: visible !important;
      }

      .preview-table-v2 th:first-child {
          z-index: 20 !important;
          background: var(--bg3) !important;
      }

      .preview-table-v2 th:first-child {
          color: #53647a !important;
          font-size: 0.8rem !important;
          letter-spacing: 0.05em;
      }

      .preview-table-v2 thead th > div:first-child {
          color: #53647a !important;
          font-family: 'Inter', sans-serif !important;
          font-size: 0.75rem !important;
          line-height: 1.1;
          font-weight: 700 !important;
          letter-spacing: 0.05em;
      }

      .preview-table-v2 thead th > div:last-child {
          color: #06142d !important;
          font-family: 'Inter', sans-serif !important;
          font-size: 1.05rem !important;
          line-height: 1.2;
          font-weight: 500 !important;
          margin-top: 2px;
          letter-spacing: -0.01em;
      }

      .preview-table-v2 td {
          height: 70px;
          padding: 0 !important;
          border-bottom: none !important;
          vertical-align: middle;
          background: transparent;
      }

      .preview-table-v2 tr:not(.header-row) td {
          background: var(--surface);
          border-top: 1px solid var(--border-soft);
          border-bottom: 1px solid var(--border-soft);
      }

      .preview-table-v2 td.emp-cell {
          padding: 0 !important;
          border-right: 1px solid var(--border) !important;
          background: var(--surface) !important;
      }

      .v-cell {
          text-align: center !important;
          vertical-align: middle !important;
          padding: 4px 8px !important;
          min-width: 130px;
      }

      .v-pill {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
          width: auto !important;
          min-width: 92px;
          max-width: 150px;
          height: 36px;
          padding: 0 16px;
          border-radius: 999px;
          font-size: 0.88rem;
          font-weight: 700;
          line-height: 1;
          white-space: nowrap;
          box-shadow: 0 2px 5px rgba(15, 23, 42, 0.05);
          transition: all 0.2s ease;
      }

      @media (max-width: 768px) {
          .v-pill {
              height: 22px;
              min-width: 64px;
              font-size: 0.58rem;
              font-weight: 600;
              border-radius: 5px;
          }
      }

      .v-empty .v-pill {
          background: transparent !important;
          border: none !important;
          box-shadow: none !important;
          color: #0f1f3a !important;
          min-width: 40px !important;
          font-weight: 800;
          opacity: 0.6;
      }

      /* Colores premium para píldoras (Index Only) */
      .v-manana .v-pill   { background: #eaf9ee !important; color: #1c7331 !important; border: 1px solid #b7ebc5 !important; }
      .v-tarde .v-pill    { background: #fff8d9 !important; color: #b46a00 !important; border: 1px solid #ffe899 !important; }
      .v-noche .v-pill    { background: #f1f5f9 !important; color: #334155 !important; border: 1px solid #cbd5e1 !important; }
      .v-descanso .v-pill { background: #fee2e2 !important; color: #991b1b !important; border: 1px solid #fecaca !important; }
      .v-vac .v-pill      { background: #e0f2fe !important; color: #0369a1 !important; border: 1px solid #bae6fd !important; }
      .v-baja .v-pill     { background: #fff1f2 !important; color: #9f1239 !important; border: 1px dashed #fecdd3 !important; }
      .v-perm .v-pill     { background: #f5f3ff !important; color: #5b21b6 !important; border: 1px solid #ddd6fe !important; }
      .v-form .v-pill     { background: #ecfdf5 !important; color: #065f46 !important; border: 1px solid #a7f3d0 !important; }

      .employee-row {
          width: 100%;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          justify-content: center;
          gap: 4px;
          padding: 8px 16px;
      }

      .employee-name {
          width: 100%;
          color: var(--text);
          font-size: 1rem;
          font-weight: 800;
          font-family: 'Outfit', sans-serif;
          letter-spacing: -0.01em;
          line-height: 1.2;
          overflow: visible !important;
          text-overflow: clip !important;
          white-space: normal !important;
          word-break: normal;
          overflow-wrap: anywhere;
      }

      .employee-stats {
          display: flex;
          align-items: center;
          gap: 6px;
          flex: 0 0 auto;
      }

      .emp-badge-n, .emp-badge-d {
          display: inline-flex;
          align-items: center;
          gap: 4px;
          padding: 2px 10px;
          border-radius: 99px;
          background: #ffffff;
          border: 1px solid #e2e8f0;
          font-size: 0.75rem;
          font-weight: 600;
          color: #1e293b;
          box-shadow: 0 1px 2px rgba(0,0,0,0.02);
      }
      .emp-badge-n .badge-icon, .emp-badge-d .badge-icon {
          font-size: 0.8rem;
      }
      .emp-badge-d .badge-icon {
          color: #2563eb;
          font-weight: 800;
      }

      .badge-icon {
          font-size: 0.58rem;
          opacity: 0.7;
          margin-left: 1px;
      }

      .night-summary {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 18px;
          box-shadow: var(--shadow-lg);
          margin: 0 0 24px;
          padding: 26px 28px 30px;
      }

      .night-summary-title {
          margin: 0 0 18px;
          font-family: 'Outfit', sans-serif;
          font-size: 1.18rem;
          font-weight: 900;
          color: var(--text);
      }

      .night-summary-month {
          margin-top: 24px;
      }

      .night-summary-month:first-child {
          margin-top: 0;
      }

      .night-summary-month h4 {
          margin: 0 0 14px;
          font-size: 1rem;
          font-weight: 900;
          color: var(--text);
          text-transform: lowercase;
      }

      .night-summary-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
          gap: 18px;
      }

      .night-summary-table {
          width: 100%;
          border-collapse: collapse;
          background: var(--surface);
          border: 1px solid var(--border);
      }

      .night-summary-table th,
      .night-summary-table td {
          border: 1px solid var(--border);
          padding: 13px 16px;
          font-size: 0.86rem;
      }

      .night-summary-table th {
          background: var(--bg3);
          color: var(--text-dim);
          font-weight: 700;
          text-align: center;
      }

      .night-summary-table td:first-child {
          font-weight: 800;
          color: var(--text);
      }

      .night-summary-table td:last-child {
          width: 120px;
          text-align: center;
          font-weight: 800;
          color: var(--text);
      }

      .night-summary-empty {
          margin: 0;
          color: var(--text-dim);
          font-weight: 700;
      }

      @media (max-width: 980px) {
          .site-toolbar {
              align-items: flex-start;
              flex-direction: column;
              padding: 14px 14px 0;
          }

          .toolbar-controls {
              justify-content: flex-start;
              width: 100%;
          }

          .toolbar-divider { display: none; }
          .public-main { padding: 12px 14px 24px; }
          .preview-week.week { border-radius: 18px; margin-bottom: 24px; }
          .preview-week-header.week-head {
              min-height: 70px;
              padding: 12px 16px;
              gap: 12px;
          }

          .preview-week-header.week-head img {
              display: none !important;
          }

          .preview-week-header.week-head h3 {
              font-size: 0.95rem;
          }

          .viewport {
              margin: 0 !important;
              border-radius: 0 0 18px 18px !important;
              border-left: none !important;
              border-right: none !important;
              border-bottom: none !important;
          }

          .preview-table-v2 {
              min-width: 800px;
              border-spacing: 0 !important;
          }

          .preview-table-v2 th:first-child,
          .preview-table-v2 td.emp-cell {
              width: 160px !important;
              min-width: 160px !important;
              max-width: 160px !important;
              box-shadow: 4px 0 8px rgba(0,0,0,0.05) !important;
          }

          .employee-row {
              padding: 8px 10px;
              flex-direction: column;
              align-items: flex-start;
              gap: 4px;
          }

          .employee-name {
              font-size: 0.85rem !important;
              white-space: normal !important;
              overflow: visible !important;
              text-overflow: clip !important;
          }

          .emp-badge-n,
          .emp-badge-d {
              width: 24px;
              height: 24px;
              padding: 0;
              justify-content: center;
              font-size: 0.6rem;
          }
          .emp-badge-n .badge-icon, .emp-badge-d .badge-icon { display: none; }

          .preview-table-v2 thead th > div:first-child {
              font-size: 0.65rem !important;
          }
          .preview-table-v2 thead th > div:last-child {
              font-size: 0.85rem !important;
          }

          .night-summary {
              border-radius: 0;
              margin: 0;
              padding: 20px 16px;
              border-left: none;
              border-right: none;
          }
      }
  </style>
</head>
<body>
  <header class="site-toolbar">
    <div class="toolbar-brand">
      <img src="Logo.png" alt="Logo">
      <div>
        <div class="toolbar-title">Cuadrantes de turnos Recepción</div>
        <div class="toolbar-subtitle">Sercotel Guadiana / Cumbria Spa&Hotel</div>
      </div>
    </div>
    <div class="toolbar-controls">
      <button class="nav-btn" onclick="toggleTheme()" id="themeBtn" title="Cambiar Modo" style="font-size: 1.1rem; padding: 4px 10px;">🌙</button>
      <div class="toolbar-divider"></div>
      <button class="nav-btn" onclick="changeWeek(-1)">← Semana</button>
      <button class="nav-btn" onclick="goToday()">Hoy</button>
      <button class="nav-btn" onclick="changeWeek(1)">semana →</button>
      <div class="toolbar-divider"></div>
      <select id="hotelSelect" class="toolbar-select" onchange="renderPublicView()">
        <option value="">Todos los Hoteles</option>
      </select>
      <input type="text" id="dateRange" class="toolbar-date">
      <a href="solicitud.html" class="request-link">↩ Solicitar Cambio</a>
    </div>
  </header>
  
  <main id="app" class="public-main"></main>
  
  <script src="supabase.js"></script>
  <script src="localforage.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="flatpickr.js"></script>
  <script src="flatpickr_es.js"></script>
  <script src="virtualizer.js?v=8.5"></script>
  <script src="supabase-config.js?v=9.8"></script>
  <script src="supabase-dao.js?v=9.14"></script>
  <script src="turnos-rules.js?v=4.1"></script>
  <script src="shift-resolver.js?v=4.1"></script>
  <script src="turnos-engine.js?v=4.1"></script>
  <script src="excel-loader.js?v=1.0"></script>
  
  <script>
    const $ = (s) => document.querySelector(s);
    if (window.location.protocol === 'file:') {
        console.error("ERROR DE SEGURIDAD: Estás abriendo el archivo vía file://. Usa http://localhost:8080 para cargar los datos correctamente.");
        alert("⚠️ ATENCIÓN: No uses el archivo directo. Usa el enlace de servidor local (localhost) para que el cuadrante funcione.");
    }
    let _picker;
    const logoFor = (h) => String(h || '').toLowerCase().includes('guadiana') ? 'guadiana logo.jpg' : 'cumbria logo.jpg';
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[char]));
    const shiftInitial = (value) => {
        const text = String(value || '').trim().toLowerCase();
        if (!text) return '';
        if (text.startsWith('m') || text.includes('mañana') || text.includes('manana')) return 'manana';
        if (text.startsWith('t') || text.includes('tarde')) return 'T';
        if (text.startsWith('n') || text.includes('noche')) return 'N';
        if (text.startsWith('d') || text.includes('descanso')) return 'D';
        return '';
    };
    const EXCEL_SOURCE_FILE = 'Plantilla%20Cuadrante%20Turnos%20v.8.0.xlsx';
    const EXCEL_HOTEL_SHEETS = ['Cumbria Spa&Hotel', 'Sercotel Guadiana'];
    const EXCEL_DAY_COLUMNS = [
        { offset: 0 }, { offset: 1 }, { offset: 2 }, { offset: 3 },
        { offset: 4 }, { offset: 5 }, { offset: 6 }
    ];
    const localIsoDate = (date) => {
        if (!(date instanceof Date) || Number.isNaN(date.getTime())) return null;
        return [
            date.getFullYear(),
            String(date.getMonth() + 1).padStart(2, '0'),
            String(date.getDate()).padStart(2, '0')
        ].join('-');
    };
    const isoToLocalDate = (dateStr) => new Date(`${dateStr}T12:00:00`);
    const addDaysIso = (dateStr, days) => {
        const date = isoToLocalDate(dateStr);
        date.setDate(date.getDate() + days);
        return localIsoDate(date);
    };
    const mondayOfIso = (dateStr) => {
        const date = isoToLocalDate(dateStr);
        const day = date.getDay() || 7;
        date.setDate(date.getDate() - day + 1);
        return localIsoDate(date);
    };
    const sundayOfIso = (dateStr) => addDaysIso(mondayOfIso(dateStr), 6);
    const buildWeekRanges = (startIso, endIso) => {
        const weeks = [];
        let weekStart = mondayOfIso(startIso);
        const lastWeekStart = mondayOfIso(endIso);
        while (weekStart <= lastWeekStart) {
            weeks.push({ start: weekStart, end: addDaysIso(weekStart, 6) });
            weekStart = addDaysIso(weekStart, 7);
        }
        return weeks;
    };
    // excelCellDate y shiftFromExcel eliminadas — las provee window.ExcelLoader (excel-loader.js)
    const monthKeyFromDate = (dateStr) => String(dateStr || '').slice(0, 7);
    const monthLabel = (monthKey) => {
        const [year, month] = String(monthKey || '').split('-').map(Number);
        if (!year || !month) return '';
        return new Date(year, month - 1, 1).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
    };
    const normalizePublishedScheduleRows = (raw) => {
        if (!Array.isArray(raw)) return [];
        return raw.map(item => {
            let hotel = item.hotel || 'Sin Hotel';
            let empleados = item.rows || item.empleados || item.employees || (item.data && item.data.empleados) || [];
            let columns = item.columns || [];
            
            return {
                hotel,
                empleados: Array.isArray(empleados) ? empleados : [],
                columns: Array.isArray(columns) ? columns : []
            };
        });
    };

    const buildNightSummary = (groups) => {
        const normalized = normalizePublishedScheduleRows(groups);
        const byMonth = new Map();

        normalized.forEach(group => {
            group.empleados.forEach(emp => {
                // EXCLUSIÓN REQUERIDA: No contar noches para personal de apoyo/ocasional puro
                // Cruzamos con el mapa global por si el snapshot no trae metadatos
                const profile = window._publicEmployeesMap?.get(window.normalizeId(emp.empleado_id || emp.nombre));
                const showCounters = window.shouldShowEmployeeCounters && window.shouldShowEmployeeCounters(profile || emp, emp);
                
                if (!showCounters) return;

                const dias = emp.cells || emp.dias || emp.days || {};
                
                // Si hay columnas definidas (formato renderSnapshotInContainer), las usamos como guía
                if (group.columns && group.columns.length > 0) {
                    group.columns.forEach((col, idx) => {
                        const date = col.dbFecha;
                        const cell = dias[date] || (emp.cells && emp.cells[idx]) || {};
                        const turno = cell.code || cell.turno || cell.label || '';
                        
                        if (shiftInitial(turno) !== 'N') return;
                        
                        const month = monthKeyFromDate(date);
                        if (!month) return;
                        
                        if (!byMonth.has(month)) byMonth.set(month, new Map());
                        const hotels = byMonth.get(month);
                        if (!hotels.has(group.hotel)) hotels.set(group.hotel, new Map());
                        const employees = hotels.get(group.hotel);
                        const empName = emp.nombre || emp.name || 'Empleado';
                        employees.set(empName, (employees.get(empName) || 0) + 1);
                    });
                } else {
                    // Si no hay columnas, iteramos sobre las llaves del objeto 'dias'
                    Object.entries(dias).forEach(([date, cell]) => {
                        const turno = cell.code || cell.turno || cell.label || '';
                        if (shiftInitial(turno) !== 'N') return;
                        
                        const month = monthKeyFromDate(date);
                        if (!month) return;
                        
                        if (!byMonth.has(month)) byMonth.set(month, new Map());
                        const hotels = byMonth.get(month);
                        if (!hotels.has(group.hotel)) hotels.set(group.hotel, new Map());
                        const employees = hotels.get(group.hotel);
                        const empName = emp.nombre || emp.name || 'Empleado';
                        employees.set(empName, (employees.get(empName) || 0) + 1);
                    });
                }
            });
        });

        return Array.from(byMonth.entries())
            .sort(([a], [b]) => a.localeCompare(b))
            .map(([month, hotels]) => ({
                month,
                hotels: Array.from(hotels.entries())
                    .sort(([a], [b]) => a.localeCompare(b, 'es', { sensitivity: 'base' }))
                    .map(([hotel, employees]) => ({
                        hotel,
                        employees: Array.from(employees.entries())
                            .sort(([nameA, countA], [nameB, countB]) => countB - countA || nameA.localeCompare(nameB, 'es', { sensitivity: 'base' }))
                    }))
            }));
    };
    const renderNightSummary = (groups) => {
        if (!groups || !Array.isArray(groups)) return '';
        
        try {
            const summary = buildNightSummary(groups);
            if (!summary.length) {
                return `
                    <section class="night-summary">
                        <h3 class="night-summary-title">Resumen de noches</h3>
                        <p class="night-summary-empty">No hay noches en las fechas publicadas.</p>
                    </section>
                `;
            }

            return `
                <section class="night-summary">
                    <h3 class="night-summary-title">Resumen de noches</h3>
                    ${summary.map(monthGroup => `
                        <div class="night-summary-month">
                            <h4>${escapeHtml(monthLabel(monthGroup.month))}</h4>
                            <div class="night-summary-grid">
                                ${monthGroup.hotels.map(hotelGroup => `
                                    <table class="night-summary-table">
                                        <thead>
                                            <tr>
                                                <th>${escapeHtml(hotelGroup.hotel)}</th>
                                                <th>Noches</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${hotelGroup.employees.map(([name, count]) => `
                                                <tr>
                                                    <td>${escapeHtml(name)}</td>
                                                    <td>${count}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                `).join('')}

                        </div>
                    `).join('')}

        } catch (err) {

            return `<section class="night-summary" style="opacity:0.6;">
                <h3 class="night-summary-title">Resumen de noches</h3>
                <p class="night-summary-empty">Temporalmente no disponible.</p>

    };
    async function loadExcelSourceRows() {
        if (window._publicExcelSourceRows) return window._publicExcelSourceRows;
        if (!window.XLSX) return {};
        const response = await fetch(EXCEL_SOURCE_FILE, { cache: 'no-store' });
        if (!response.ok) throw new Error(`No se pudo leer el Excel original (${response.status})`);
        const buffer = await response.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array', cellDates: true });
        const result = {};

        EXCEL_HOTEL_SHEETS.forEach(hotel => {
            const sheet = workbook.Sheets[hotel];
            if (!sheet) return;
            const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: true });
            result[hotel] = matrix.slice(1).map((row, index) => ({
                hotel,
                rowIndex: index,
                weekStart: excelCellDate(row[0]),
                displayName: String(row[1] || '').trim(),
                empleadoId: String(row[1] || '').trim(),
                values: EXCEL_DAY_COLUMNS.map((_, i) => shiftFromExcel(row[i + 2]))
            })).filter(row => row.weekStart && row.empleadoId);
        });

        window._publicExcelSourceRows = result;
        return result;
    }
    


    /**
     * ARQUITECTURA CRÍTICA:
     * Esta vista es de solo lectura.
     * Admin resuelve turnos, ausencias, sustituciones y cambios.
     * Esta vista solo lee snapshots publicados y renderiza.
     * No usar eventos_cuadrante aquí para reconstruir el cuadrante.
     */
    const CONSUMER_VIEW_MODE = 'READ_ONLY_PUBLISHED_SNAPSHOT';

    window.renderPublicView = async () => {
        if (window.DEBUG_MODE) {
            console.warn('[ARCHITECTURE] Vista de consumo: no recalcular reglas operativas aquí. Leer snapshot publicado.');
        }

        const area = document.getElementById('app');
        if (!area) return;

        // Carga opcional de metadatos de empleados para enriquecer snapshots antiguos
        if (!window._publicEmployeesMap) {
            try {
                const emps = await window.TurnosDB.getEmpleados().catch(() => []);
                window._publicEmployeesMap = new Map(emps.map(e => [window.normalizeId(e.id || e.nombre), e]));
            } catch (e) { console.warn("No se pudieron cargar metadatos de empleados para el cruce visual."); }
        }
        const selHotel = document.getElementById('hotelSelect').value;
        const rangeStr = document.getElementById('dateRange').value;

        let startIso, endIso;
        if (rangeStr.includes(" a ")) {
            [startIso, endIso] = rangeStr.split(" a ");
        } else if (/^\d{4}-\d{2}-\d{2}$/.test(rangeStr)) {
            startIso = rangeStr;
            endIso = rangeStr;
        } else {
            const d = new Date();
            const off = (d.getDay() === 0 ? -6 : 1 - d.getDay());
            d.setDate(d.getDate() + off);
            startIso = d.toISOString().split('T')[0];
            const endD = new Date(d);
            endD.setDate(endD.getDate() + 6);
            endIso = endD.toISOString().split('T')[0];
        }
        if (endIso < startIso) [startIso, endIso] = [endIso, startIso];

        area.innerHTML = `<div style="padding:4rem; text-align:center; opacity:0.5; font-weight:700;">Cargando cuadrante publicado...</div>`;

        try {
            // ÚNICA FUENTE DE VERDAD PARA CONSUMO: Snapshots horneados por Admin
            const result = await window.TurnosDB.loadPublishedSchedule({ 
                semanaInicio: startIso, 
                semanaFin: endIso 
            });
            
            if (!result.ok) {
                area.innerHTML = `<div style="padding:4rem; text-align:center; opacity:0.8; font-weight:600; color:var(--text-dim);">
                    <div style="font-size:3rem; margin-bottom:1rem;">📅</div>
                    ${result.message}
                </div>`;
                return;
            }

            area.innerHTML = '';
            
            // Función de orden estable de hoteles
            const getHotelOrder = (h) => {
                const n = (h || "").toLowerCase();
                if (n.includes("cumbria")) return 1;
                if (n.includes("guadiana")) return 2;
                return 999;
            };

            // Ordenar por Hotel y luego por Semana
            result.snapshots.sort((a, b) => {
                const orderA = getHotelOrder(a.hotel);
                const orderB = getHotelOrder(b.hotel);
                if (orderA !== orderB) return orderA - orderB;
                return (a.semana_inicio || "").localeCompare(b.semana_inicio || "");
            });

            const nightSummaryGroups = [];

            // Filtrar y renderizar snapshots
            result.snapshots.forEach(snap => {
                if (selHotel && snap.hotel !== selHotel) return;

                const hName = snap.hotel;
                const rosterGrid = snap.data; // El Snapshot es el resultado de buildRosterGrid de Admin
                const weekStart = snap.semanaInicio || rosterGrid.semana_inicio;

                const safeId = `${hName}-${weekStart}`.replace(/[^a-z0-9]/gi, '-');
                const card = document.createElement('div');
                card.className = 'preview-week week';
                card.innerHTML = `
                    <div class="preview-week-header week-head">
                        <img src="${logoFor(hName)}" alt="${escapeHtml(hName)}">
                        <h3>${escapeHtml(hName.toUpperCase())} <span style="display:block; margin-top:5px; color:var(--text-dim); font-size:0.82rem; font-weight:800;">Semana del ${escapeHtml(window.TurnosDB.fmtDateLegacy(weekStart))}</span></h3>
                    </div>
                    <div id="grid-container-${safeId}" style="padding:0;"></div>
                `;
                area.appendChild(card);

                const container = card.querySelector(`#grid-container-${safeId}`);
                const rendered = renderSnapshotInContainer(container, rosterGrid, hName);
                nightSummaryGroups.push({ hotel: hName, ...rendered });
            });

            if (area.children.length === 0) {
                area.innerHTML = `<div style="padding:4rem; text-align:center; opacity:0.5;">No hay cuadrante publicado para los filtros seleccionados.</div>`;
            } else {
                area.insertAdjacentHTML('beforeend', renderNightSummary(nightSummaryGroups));
            }
        } catch (e) {
            console.error(e);
            area.innerHTML = `<div style="padding:4rem; text-align:center; color:red;">Error de carga: ${e.message}</div>`;
        }
    };



    function renderSnapshotInContainer(container, snapshotData, hotelName) {
        // En el nuevo formato, snapshotData tiene { semana_inicio, semana_fin, hotel, empleados: [...] }
        const empleados = snapshotData.empleados || [];
        const semanaInicio = snapshotData.semana_inicio;
        
        // Calcular fechas de la semana desde el snapshot
        const dates = [];
        let curr = new Date(semanaInicio + "T12:00:00");
        for (let i = 0; i < 7; i++) {
            dates.push(window.TurnosDB.normalizeDate(curr));
            curr.setDate(curr.getDate() + 1);
        }

        const dayNames = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
        const monthNames = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

        const columns = dates.map(iso => {
            const d = new Date(iso + "T12:00:00");
            return {
                dbFecha: iso,
                title: dayNames[d.getDay()],
                subtitle: `${d.getDate()}/${monthNames[d.getMonth()]}/${d.getFullYear().toString().slice(-2)}`,
                isWeekend: d.getDay() === 0 || d.getDay() === 6,
                isToday: iso === new Date().toISOString().split('T')[0]
            };
        });

        const table = new window.VirtualTable(container, { columns, rowHeight: 76 });

        table.renderCellContent = (cell, dayData, empName, fecha) => {
            const data = dayData || {};
            const isCompact = window.matchMedia('(max-width: 640px)').matches;
            const display = window.TurnosRules.getPublicCellDisplay(data, { compact: isCompact });
            
            // Clase visual basada en el label normalizado (reglas del Snapshot V12)
            const norm = (display.label || '').toLowerCase();
            let cls = 'v-empty';

            if (norm.includes('vac')) cls = 'v-vac';
            else if (norm.includes('mañana') || norm === 'm') cls = 'v-manana';
            else if (norm.includes('tarde') || norm === 't') cls = 'v-tarde';
            else if (norm.includes('noche') || norm === 'n') cls = 'v-noche';
            else if (norm.includes('descanso') || norm === 'd') cls = 'v-descanso';
            else if (norm.includes('baja') || norm === 'it') cls = 'v-baja';
            else if (norm.includes('permiso') || norm === 'perm') cls = 'v-perm';
            else if (norm.includes('formación') || norm.includes('formacion') || norm === 'form') cls = 'v-form';
            
            if (data.titular_cubierto) cell.title = `Cubriendo a ${data.titular_cubierto}`;

            cell.className = `v-cell ${cls}`;
            cell.innerHTML = '';
            
            const pill = document.createElement('div');
            pill.className = 'v-pill';
            pill.textContent = display.text;
            
            cell.appendChild(pill);
        };

        table.renderRow = function(tr, rowData) {
            const tds = tr.children;
            tds[0].colSpan = 1; tds[0].style.display = '';

            // Cálculo de resúmenes visuales desde los datos horneados
            let nights = 0, rests = 0;
            const daysMap = rowData.dias || rowData.cells || {};
            dates.forEach(f => {
                const d = daysMap[f] || {};
                const c = (d.code || '').toUpperCase();
                if (c.startsWith('N')) nights++;
                if (c.startsWith('D')) rests++;
            });

            const isCompact = window.matchMedia('(max-width: 640px)').matches;
            
            // Detección de chips: Regla operativa vs Apoyo estructural
            const profile = window._publicEmployeesMap?.get(window.normalizeId(rowData.empleado_id || rowData.nombre));
            const showCounters = window.shouldShowEmployeeCounters && window.shouldShowEmployeeCounters(profile || rowData, rowData);

            const isAbsent = rowData.rowType === 'ausencia_informativa';
            tds[0].innerHTML = `
                <div class="employee-row" style="${isAbsent ? 'opacity:0.6;' : ''}">
                    <span class="employee-name">${escapeHtml(rowData.nombre)}</span>
                    ${(isCompact || !showCounters || isAbsent) ? '' : `
                    <div class="employee-stats">
                        <span class="emp-badge-n" title="Noches: ${nights}"><span class="badge-icon" aria-hidden="true">&#x1F319;</span> ${nights}</span>
                        <span class="emp-badge-d" title="Descansos: ${rests}"><span class="badge-icon" aria-hidden="true">D</span> ${rests}</span>
                    </div>
                    `}
                </div>
            `;

            for (let i = 0; i < this.columns.length; i++) {
                const f = this.columns[i].dbFecha;
                this.renderCellContent(tds[i+1], rowData.dias[f], rowData.nombre, f);
            }
        };

        // REGLA OBLIGATORIA: De-duplicación y Orden Estricto (Operativos -> Ausentes)
        const uniqueEmpsMap = new Map();
        const norm = (str) => {
            if (window.normalizeId) return window.normalizeId(str);
            if (window.TurnosDB && window.TurnosDB.normalizeString) return window.TurnosDB.normalizeString(str);
            return String(str || '').toLowerCase().trim();
        };

        empleados.forEach(e => {
            const id = norm(e.empleado_id || e.nombre);
            const isAbsent = e.rowType === 'ausencia_informativa';
            
            if (!uniqueEmpsMap.has(id)) {
                uniqueEmpsMap.set(id, e);
            } else {
                const existing = uniqueEmpsMap.get(id);
                // Preferimos la fila operativa sobre la de ausencia informativa
                if (existing.rowType === 'ausencia_informativa' && !isAbsent) {
                    uniqueEmpsMap.set(id, e);
                }
            }
        });

        const finalEmps = Array.from(uniqueEmpsMap.values()).sort((a,b) => {
            const isAbsentA = a.rowType === 'ausencia_informativa';
            const isAbsentB = b.rowType === 'ausencia_informativa';
            
            // 1. Prioridad: Operativos antes que Ausencias Informativas
            if (isAbsentA !== isAbsentB) return isAbsentA ? 1 : -1;
            
            // 2. Orden secundario: puestoOrden (Excel)
            const valA = Number(a.puestoOrden) || Number(a.orden) || 9999;
            const valB = Number(b.puestoOrden) || Number(b.orden) || 9999;
            return valA - valB;
        });

        table.setData(finalEmps);
        return { rows: empleados, columns };
    }

    window.changeWeek = (delta) => {
        const current = _picker.selectedDates[0] || new Date();
        current.setDate(current.getDate() + (delta * 7));
        const monday = new Date(current);
        monday.setDate(monday.getDate() + (monday.getDay() === 0 ? -6 : 1 - monday.getDay()));
        const sunday = new Date(monday);
        sunday.setDate(sunday.getDate() + 6);
        _picker.setDate([monday, sunday]);
        window.renderPublicView();
    };

    window.goToday = () => {
        const d = new Date();
        const monday = new Date(d);
        monday.setDate(monday.getDate() + (monday.getDay() === 0 ? -6 : 1 - monday.getDay()));
        const sunday = new Date(monday);
        sunday.setDate(sunday.getDate() + 6);
        _picker.setDate([monday, sunday]);
        window.renderPublicView();
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('public-theme', isDark ? 'dark' : 'light');
        const btn = document.getElementById('themeBtn');
        if (btn) btn.innerText = isDark ? '&#x2600;&#xFE0F;' : '&#x1F319;';
    };

    if (localStorage.getItem('public-theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const btn = document.getElementById('themeBtn');
        if (btn && document.body.classList.contains('dark-mode')) {
            btn.innerText = '&#x2600;&#xFE0F;';
        }
        _picker = flatpickr("#dateRange", {
            mode: "range",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "Y-m-d",
            locale: { ...flatpickr.l10ns.es, firstDayOfWeek: 1 },
            onChange: () => window.renderPublicView()
        });
        const hotels = await window.TurnosDB.getHotels();
        $('#hotelSelect').innerHTML = '<option value="">Todos los Hoteles</option>' +
            hotels.map(h => '<option value="' + h + '">' + h + '</option>').join('');
        window.goToday();
    });
  </script>
