<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TurnosWeb — Cuadrante Público</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flatpickr.min.css">
  <style>
      :root {
          --bg: #eef2f6;
          --toolbar-bg: rgba(255, 255, 255, 0.92);
          --surface: #ffffff;
          --surface-soft: #f6f9fc;
          --border: #d7dee8;
          --grid: #d6dde6;
          --text: #0c2138;
          --text-dim: #64748b;
          --accent: #1f4f82;
          --accent-soft: #e2eefb;
          --mint-bg: #d8efda;
          --mint-text: #0b6044;
          --amber-bg: #ffefbd;
          --amber-text: #9d6a00;
          --rose-bg: #f9d8db;
          --rose-text: #a11c24;
          --slate-bg: #e7ebef;
          --slate-text: #223247;
          --cyan-bg: #ccecf7;
          --cyan-text: #075a74;
          --toolbar-shadow: 0 10px 30px rgba(12, 33, 56, 0.08);
      }

      body.night-mode {
          --bg: #0f1724;
          --toolbar-bg: rgba(15, 23, 36, 0.9);
          --surface: #132033;
          --surface-soft: #18283d;
          --border: #28405b;
          --grid: #29415c;
          --text: #e5edf6;
          --text-dim: #9db1c7;
          --accent: #84b8ff;
          --accent-soft: rgba(132, 184, 255, 0.18);
          --mint-bg: #183d31;
          --mint-text: #bdebd0;
          --amber-bg: #473811;
          --amber-text: #ffe19a;
          --rose-bg: #45232a;
          --rose-text: #ffc2c8;
          --slate-bg: #243345;
          --slate-text: #d8e3ef;
          --cyan-bg: #173a45;
          --cyan-text: #afe7f5;
          --toolbar-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
      }

      * { box-sizing: border-box; }

      body {
          background:
              radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 22%),
              linear-gradient(180deg, #f7f9fb 0%, var(--bg) 100%);
          font-family: 'Manrope', sans-serif;
          color: var(--text);
          margin: 0;
          min-height: 100vh;
      }

      svg { max-width: 100%; height: auto; }
      .flatpickr-calendar svg { width: 14px; height: 14px; }

      .site-toolbar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 0 28px;
          height: 78px;
          background: var(--toolbar-bg);
          color: var(--text);
          position: sticky;
          top: 0;
          z-index: 1000;
          backdrop-filter: blur(14px);
          border-bottom: 1px solid rgba(215, 222, 232, 0.9);
          box-shadow: var(--toolbar-shadow);
      }

      .toolbar-brand { display: flex; flex-direction: column; }
      .toolbar-title {
          font-weight: 800;
          font-size: 1.18rem;
          line-height: 1.05;
          letter-spacing: -0.03em;
      }
      .toolbar-subtitle {
          font-size: 0.72rem;
          font-weight: 700;
          letter-spacing: 0.08em;
          color: var(--text-dim);
          text-transform: uppercase;
      }

      .toolbar-controls { display: flex; align-items: center; gap: 10px; }
      .toolbar-controls > div:first-child {
          display: flex;
          background: #f8fafc !important;
          border-radius: 999px !important;
          padding: 4px !important;
          border: 1px solid var(--border) !important;
      }

      .btn-nav, .toolbar-select, .toolbar-date {
          background: #ffffff;
          border: 1px solid var(--border);
          color: var(--text);
          padding: 8px 14px;
          border-radius: 12px;
          font-size: 0.83rem;
          font-weight: 700;
          cursor: pointer;
          outline: none;
          box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
      }
      .toolbar-controls > div:first-child .btn-nav {
          border: none !important;
          background: transparent !important;
          box-shadow: none !important;
      }
      .toolbar-controls > div:first-child .btn-nav:nth-child(2) {
          background: #ffffff !important;
          border-radius: 999px !important;
          border-left: 1px solid var(--border) !important;
          border-right: 1px solid var(--border) !important;
      }
      .toolbar-select { min-width: 160px; }
      .toolbar-date { width: 178px; text-align: center; }

      .btn-request {
          background: var(--accent);
          color: #ffffff;
          padding: 10px 18px;
          border-radius: 999px;
          font-weight: 800;
          text-decoration: none;
          font-size: 0.85rem;
          margin-left: 10px;
          display: flex; align-items: center; gap: 6px;
          box-shadow: 0 8px 20px rgba(31, 79, 130, 0.18);
      }

      .public-main { padding: 22px 0 34px; }
      
      .hotel-card {
          background: var(--surface);
          margin: 0 auto 24px;
          max-width: 96%;
          border-radius: 18px;
          border: 1px solid var(--border);
          box-shadow: 0 18px 44px rgba(12, 33, 56, 0.06);
          overflow: hidden;
      }

      .hotel-header {
          padding: 26px 28px 16px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          background: linear-gradient(180deg, var(--surface-soft) 0%, var(--surface) 100%);
      }
      .hotel-heading {
          display: flex;
          align-items: center;
          gap: 16px;
      }
      .hotel-logo {
          width: 56px; height: 56px;
          border: 1px solid var(--border);
          border-radius: 14px;
          display: flex; align-items: center; justify-content: center;
          padding: 6px; background: #fff;
          box-shadow: 0 10px 24px rgba(12, 33, 56, 0.08);
      }
      .hotel-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }

      .hotel-info h2 {
          margin: 0;
          font-size: 1.14rem;
          font-weight: 800;
          letter-spacing: -0.02em;
          text-transform: uppercase;
      }
      .hotel-info .week-label {
          font-size: 0.82rem;
          font-weight: 800;
          color: var(--accent);
          text-transform: uppercase;
          margin-top: 4px;
      }
      .header-mode {
          display: inline-flex;
          align-items: center;
          gap: 4px;
          padding: 4px;
          border: 1px solid var(--border);
          border-radius: 999px;
          background: rgba(255,255,255,0.55);
      }
      .mode-btn {
          border: none;
          background: transparent;
          color: var(--text-dim);
          padding: 8px 12px;
          border-radius: 999px;
          font: inherit;
          font-size: 0.75rem;
          font-weight: 800;
          cursor: pointer;
      }
      .mode-btn.active {
          background: var(--accent-soft);
          color: var(--accent);
      }

      .hotel-card > .viewport { padding: 0 22px 22px; }
      .hotel-card > .viewport > .viewport {
          height: var(--public-table-height, 70vh) !important;
          min-height: 0 !important;
          max-height: 70vh !important;
          background: linear-gradient(180deg, var(--surface-soft) 0%, var(--surface) 100%) !important;
          border: 1px solid var(--grid) !important;
          border-radius: 12px !important;
          box-shadow: none !important;
      }
      
      .preview-table-v2 {
          width: 100%;
          border-collapse: collapse !important;
          border-spacing: 0 !important;
          table-layout: auto;
      }
      
      .preview-table-v2 th {
          background: var(--accent-soft) !important;
          padding: 16px 8px 14px !important;
          text-align: center;
          font-weight: 700;
          color: var(--text-dim);
          text-transform: capitalize;
          font-size: 0.72rem;
          border: 1px solid var(--grid);
          vertical-align: middle;
      }

      .preview-table-v2 td {
          padding: 10px 8px !important;
          border: 1px solid var(--grid);
          vertical-align: middle;
          background: var(--surface);
      }

      .emp-cell {
          width: 220px;
          min-width: 220px;
          padding-left: 0 !important;
          background: var(--surface);
          position: sticky;
          left: 0;
          z-index: 10;
      }
      .employee-head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
      }
      
      .employee-name {
          font-weight: 700;
          color: var(--text);
          font-size: 1rem;
          line-height: 1.15;
      }
      
      .emp-badges { display: flex; gap: 6px; flex-shrink: 0; }
      
      .badge {
          display: inline-flex;
          align-items: center;
          gap: 3px;
          padding: 4px 10px;
          border-radius: 999px;
          background: var(--surface);
          color: var(--text-dim);
          font-size: 0.74rem;
          font-weight: 700;
          border: 1px solid var(--border);
      }
      
      .badge-icon { font-size: 0.85rem; }

      .turno-pill {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 8px 12px;
          border-radius: 999px;
          font-weight: 700;
          font-size: 0.82rem;
          min-width: 92px;
          width: auto;
          max-width: 100%;
          gap: 6px;
          margin: 0 auto;
          border: 1px solid transparent;
          box-shadow: inset 0 -1px 0 rgba(255,255,255,0.4);
      }

      .v-m, .v-manana { background: var(--mint-bg); color: var(--mint-text); border-color: #c7e5ca; }
      .v-t, .v-tarde { background: var(--amber-bg); color: var(--amber-text); border-color: #f3df9b; }
      .v-n, .v-noche { background: var(--slate-bg); color: var(--slate-text); border-color: #d8dee5; }
      .v-d, .v-descanso { background: var(--rose-bg); color: var(--rose-text); border-color: #efc3c7; }
      .v-v, .v-vac {
          background: #e8f9ff;
          color: #0072a7;
          border-color: #aee6ff;
          box-shadow: none;
      }
      .v-baja { background: #fde7d5; color: #a24b14; border-color: #f5cfaf; }
      .v-p, .v-permiso { background: #ece6ff; color: #5c3bc4; border-color: #dcd0ff; }

      .icon-sync { font-size: 0.7rem; color: inherit; opacity: 0.85; }
      .icon-moon { font-size: 0.78rem; color: #d48a00; }
      .icon-vac { font-size: 0.82rem; }
      .empty-dash {
          color: #c0c8d2;
          font-weight: 600;
          text-align: center;
          display: block;
          font-size: 1.05rem;
      }

      .preview-table-v2 tr:hover td { background: var(--surface-soft); }
      .preview-table-v2 tr:hover .emp-cell { background: var(--surface-soft); }
      .preview-table-v2 th:first-child,
      .preview-table-v2 td:first-child { border-left: 1px solid var(--grid); }
      .preview-table-v2 th:first-child {
          width: 220px !important;
          min-width: 220px !important;
          background: var(--accent-soft) !important;
      }
      .preview-table-v2 th.today > div:last-child { color: var(--accent); }
      .preview-table-v2 th.weekend { background: color-mix(in srgb, var(--accent-soft) 62%, var(--surface) 38%) !important; }

      .night-summary {
          width: min(1120px, calc(100% - 44px));
          margin: 0 auto;
          padding: 4px 0 12px;
      }
      .night-summary-title {
          margin: 0 0 16px;
          font-size: 1.12rem;
          font-weight: 800;
          color: var(--text);
      }
      .night-month {
          margin: 0 0 22px;
      }
      .night-month h3 {
          margin: 0 0 12px;
          font-size: 1.4rem;
          font-weight: 800;
          color: var(--text);
          text-transform: lowercase;
      }
      .night-month-days {
          font-size: 0.78rem;
          font-weight: 700;
          color: var(--text-dim);
          margin-left: 8px;
          white-space: nowrap;
      }
      .night-hotel-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
          gap: 16px;
          align-items: start;
      }
      .night-hotel {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 14px 30px rgba(12, 33, 56, 0.06);
      }
      .night-table {
          width: 100%;
          border-collapse: collapse;
          table-layout: fixed;
      }
      .night-table th,
      .night-table td {
          border: 1px solid var(--grid);
          padding: 14px 16px;
          background: var(--surface);
      }
      .night-table th {
          font-size: 0.95rem;
          font-weight: 700;
          color: var(--accent);
          background: var(--surface-soft);
      }
      .night-table td:last-child,
      .night-table th:last-child {
          width: 118px;
          text-align: center;
      }
      .night-empty {
          padding: 30px;
          text-align: center;
          color: var(--text-dim);
          font-weight: 700;
          border: 1px dashed var(--border);
          border-radius: 16px;
          background: rgba(255,255,255,0.35);
      }

      @media (max-width: 1100px) {
          .site-toolbar {
              height: auto;
              padding: 16px 18px;
              flex-direction: column;
              align-items: flex-start;
              gap: 14px;
          }

          .toolbar-controls {
              width: 100%;
              flex-wrap: wrap;
          }

          .hotel-card > .viewport {
              padding: 0 12px 14px;
          }

          .emp-cell,
          .preview-table-v2 th:first-child {
              width: 220px !important;
              min-width: 220px !important;
          }
      }
  </style>
</head>
<body>
  <div class="site-toolbar">
    <div class="toolbar-brand">
      <div class="toolbar-title">Cuadrantes de turnos Recepción</div>
      <div class="toolbar-subtitle">Sercotel Guadiana / Cumbria Spa&Hotel</div>
    </div>
    <div class="toolbar-controls">
      <div style="display:flex; background:#2a2e35; border-radius:8px; padding:2px; border:1px solid #3b4048;">
        <button class="btn-nav" style="border:none; background:transparent;" onclick="changeWeek(-1)">← Semana</button>
        <button class="btn-nav" style="border:none; background:transparent; border-left:1px solid #3b4048; border-right:1px solid #3b4048;" onclick="goToday()">Hoy</button>
        <button class="btn-nav" style="border:none; background:transparent;" onclick="changeWeek(1)">semana →</button>
      </div>
      <select id="hotelSelect" class="toolbar-select" onchange="renderPublicView()">
        <option value="">Ambos hoteles</option>
        <option value="Sercotel Guadiana">Sercotel Guadiana</option>
        <option value="Cumbria Spa&Hotel">Cumbria Spa&Hotel</option>
      </select>
      <input type="text" id="dateRange" class="toolbar-date" readonly>
      <a href="solicitud.html" class="btn-request">
        <span>🔄 Solicitar Cambio</span>
      </a>
    </div>
  </div>

  <div id="publicContainer" class="public-main"></div>

  <script src="flatpickr.js"></script>
  <script src="supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-dao.js"></script>

</script>
  <script src="virtualizer.js"></script>
  <script>
    let _picker;
    const $ = s => document.querySelector(s);
    const escapeHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const monthNamesFull = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    const formatDateLocal = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    const isNightCode = (value) => String(value || '').toUpperCase().startsWith('N');

    function accumulateNightSummary(summaryByMonth, hotelName, employeeName, fecha) {
        const dt = new Date(`${fecha}T12:00:00`);
        const monthKey = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        if (!summaryByMonth.has(monthKey)) summaryByMonth.set(monthKey, new Map());
        const hotels = summaryByMonth.get(monthKey);
        if (!hotels.has(hotelName)) hotels.set(hotelName, new Map());
        const employees = hotels.get(hotelName);
        employees.set(employeeName, (employees.get(employeeName) || 0) + 1);
    }

    function getSelectedDaysInMonth(year, month, rangeStart, rangeEnd) {
        const monthStart = new Date(year, month - 1, 1, 12);
        const monthEnd = new Date(year, month, 0, 12);
        const selectedStart = new Date(`${rangeStart}T12:00:00`);
        const selectedEnd = new Date(`${rangeEnd}T12:00:00`);
        const start = selectedStart > monthStart ? selectedStart : monthStart;
        const end = selectedEnd < monthEnd ? selectedEnd : monthEnd;
        if (end < start) return 0;
        return Math.round((end - start) / 86400000) + 1;
    }

    function renderNightSummary(container, summaryByMonth, hasRows, rangeStart, rangeEnd) {
        const section = document.createElement('section');
        section.className = 'night-summary';

        if (!hasRows || !summaryByMonth.size) {
            section.innerHTML = `
                <h2 class="night-summary-title">Resumen de noches</h2>
                <div class="night-empty">No hay noches en el periodo seleccionado.</div>
            `;
            container.appendChild(section);
            return;
        }

        let html = '<h2 class="night-summary-title">Resumen de noches</h2>';
        [...summaryByMonth.entries()].sort((a, b) => a[0].localeCompare(b[0])).forEach(([monthKey, hotels]) => {
            const [year, month] = monthKey.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const selectedDays = getSelectedDaysInMonth(year, month, rangeStart, rangeEnd);
            html += `<div class="night-month"><h3>${monthNamesFull[month - 1]} de ${year}<span class="night-month-days">(${selectedDays} de ${daysInMonth} días)</span></h3><div class="night-hotel-grid">`;

            [...hotels.entries()].sort((a, b) => a[0].localeCompare(b[0], 'es')).forEach(([hotelName, employees]) => {
                const rows = [...employees.entries()]
                    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'es'))
                    .map(([employeeName, total]) => `
                        <tr>
                            <td>${escapeHtml(employeeName)}</td>
                            <td>${total}</td>
                        </tr>
                    `).join('');

                html += `
                    <div class="night-hotel">
                        <table class="night-table">
                            <thead>
                                <tr>
                                    <th>${escapeHtml(hotelName)}</th>
                                    <th>Noches</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            });

            html += '</div></div>';
        });

        section.innerHTML = html;
        container.appendChild(section);
    }

    function applyTheme(theme) {
        document.body.classList.toggle('night-mode', theme === 'night');
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.theme === theme);
        });
        localStorage.setItem('public-theme', theme);
    }

    window.setVisualTheme = (theme) => applyTheme(theme);

    window.renderPublicView = async () => {
        const hotel = $('#hotelSelect').value;
        const range = _picker.selectedDates;
        if (range.length < 2) return;
        const start = formatDateLocal(range[0]);
        const end = formatDateLocal(range[1]);
        
        const container = $('#publicContainer');
        container.innerHTML = '<div style="padding:100px; text-align:center; font-weight:700; color:#5f6f84;">Cargando cuadrante...</div>';

        const { data: snaps } = await window.TurnosDB.client
            .from('publicaciones_cuadrante')
            .select('*')
            .eq('estado', 'activo')
            .gte('semana_inicio', start)
            .lte('semana_inicio', end)
            .order('semana_inicio', { ascending: true })
            .order('hotel', { ascending: true })
            .order('version', { ascending: false });

        if (!snaps || snaps.length === 0) {
            container.innerHTML = '<div style="padding:100px; text-align:center; font-weight:700; color:#5f6f84;">No hay cuadrantes publicados desde esta fecha.</div>';
            return;
        }

        container.innerHTML = '';
        
        // Agrupar por hotel y semana para solo mostrar la última versión de cada combinación
        const seen = new Set();
        const summaryByMonth = new Map();
        let hasRows = false;
        snaps.forEach(s => {
            const key = `${s.hotel}_${s.semana_inicio}`;
            if (seen.has(key)) return;
            if (hotel && s.hotel !== hotel) return;
            if (s.hotel.toUpperCase().startsWith('TEST')) return; // Safety filter V12.5
            seen.add(key);
            hasRows = true;
            renderHotelSection(container, s, start, end, summaryByMonth);
        });
        renderNightSummary(container, summaryByMonth, hasRows, start, end);
        applyTheme(localStorage.getItem('public-theme') || 'day');
    };

    function renderHotelSection(container, snap, rangeStart, rangeEnd, summaryByMonth) {
        const div = document.createElement('div');
        div.className = 'hotel-card';
        const logoUrl = snap.hotel.includes('Sercotel') ? 'guadiana logo.jpg' : 'cumbria logo.jpg';
        const formattedWeek = snap.semana_inicio.split('-').reverse().join('/');

        div.innerHTML = `
            <div class="hotel-header">
                <div class="hotel-heading">
                    <div class="hotel-logo"><img src="${logoUrl}"></div>
                    <div class="hotel-info">
                        <h2>${snap.hotel}</h2>
                        <div class="week-label">SEMANA DEL ${formattedWeek}</div>
                    </div>
                </div>
                <div class="header-mode">
                    <button type="button" class="mode-btn" data-theme="day" onclick="setVisualTheme('day')">Día</button>
                    <button type="button" class="mode-btn" data-theme="night" onclick="setVisualTheme('night')">Noche</button>
                </div>
            </div>
            <div class="viewport"></div>
        `;
        container.appendChild(div);
        
        const viewport = div.querySelector('.viewport');
        const rows = snap.snapshot_json.rows || snap.snapshot_json.empleados || [];
        
        const dates = [];
        let d = new Date(snap.semana_inicio + 'T12:00:00');
        for(let i=0; i<7; i++){
            dates.push(formatDateLocal(d));
            d.setDate(d.getDate()+1);
        }

        const days = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
        const todayKey = formatDateLocal(new Date());
        const columns = dates.map((f, idx) => {
            const dt = new Date(f + 'T12:00:00');
            return {
                title: days[dt.getDay()],
                subtitle: `${dt.getDate()}/${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][dt.getMonth()]}/${String(dt.getFullYear()).slice(-2)}`,
                dbFecha: f,
                width: 140,
                isWeekend: dt.getDay() === 0 || dt.getDay() === 6,
                isToday: f === todayKey
            };
        });

        const table = new window.VirtualTable(viewport, { columns, rowHeight: 62 });

        table.renderCellContent = function(cell, data, empName, fecha) {
            if (!data || data.code === '—' || data.code === '') {
                return cell.innerHTML = '<span class="empty-dash">—</span>';
            }
            const display = window.TurnosRules.getPublicCellDisplay(data, { compact: false });
            const cls = window.TurnosRules.shiftKey(data.code, data.type);
            
            cell.innerHTML = '';
            const pill = document.createElement('div');
            pill.className = `turno-pill v-${cls}`;
            pill.textContent = display.label;
            if (cls === 'v' || cls === 'vac') {
                pill.innerHTML += ' <span class="icon-vac">\u{1F3D6}\u{FE0F}</span>';
            }
            
            if (cls === 'n' || cls === 'noche') {
                pill.innerHTML += ' <span class="icon-moon">\u{1F319}</span>';
            }
            
            if (display.icons && display.icons.includes('\u{1F504}')) {
                pill.innerHTML += ' <span class="icon-sync">\u{1F504}</span>';
            }
            if (display.icons && display.icons.includes('\u{1F4CC}')) {
                pill.innerHTML += ' <span class="icon-pin">\u{1F4CC}</span>';
            }
            cell.appendChild(pill);
        };

        table.renderRow = function(tr, rowData) {
            const tds = tr.children;
            let nights = 0, rests = 0;
            const daysMap = rowData.dias || rowData.cells || {};
            dates.forEach(f => {
                const d = daysMap[f] || {};
                const c = (d.code || '').toUpperCase();
                if (c.startsWith('N')) nights++;
                if (c.startsWith('D')) rests++;
            });

            const isAbsent = rowData.rowType === 'ausencia_informativa';
            const displayName = rowData.nombreVisible || rowData.nombre || 'Pendiente';

            tds[0].innerHTML = `
                <div class="emp-cell ${isAbsent ? 'ausencia-row' : ''}">
                    <div class="employee-head">
                        <div class="employee-name">${escapeHtml(displayName)}</div>
                    ${isAbsent ? '' : `
                    <div class="emp-badges">
                        <span class="badge"><span class="badge-icon">🌙</span> ${nights}</span>
                        <span class="badge">D ${rests}</span>
                    </div>
                    `}
                    </div>
                </div>
            `;

            dates.forEach((f, i) => {
                table.renderCellContent(tds[i+1], daysMap[f], rowData.nombre, f);
            });
        };

        const sorted = [...rows].sort((a,b) => {
            const isAbsA = a.rowType === 'ausencia_informativa';
            const isAbsB = b.rowType === 'ausencia_informativa';
            if (isAbsA !== isAbsB) return isAbsA ? 1 : -1;
            return (a.puestoOrden || 999) - (b.puestoOrden || 999);
        });

        sorted.forEach(rowData => {
            const daysMap = rowData.dias || rowData.cells || {};
            dates.forEach(f => {
                const dayData = daysMap[f] || {};
                const code = String(dayData.code || dayData.turno || '').toUpperCase();
                if (f >= rangeStart && f <= rangeEnd && isNightCode(code)) {
                    accumulateNightSummary(summaryByMonth, snap.hotel, rowData.nombreVisible || rowData.nombre || 'Pendiente', f);
                }
            });
        });

        const headerHeight = 64;
        const scrollbarHeight = 18;
        const contentHeight = headerHeight + (sorted.length * 62) + scrollbarHeight + 2;
        const maxHeight = Math.floor(window.innerHeight * 0.7);
        const tableHeight = Math.min(contentHeight, maxHeight);
        table.viewport.style.setProperty('height', `${tableHeight}px`, 'important');
        table.viewport.style.setProperty('min-height', '0', 'important');
        table.viewport.style.setProperty('max-height', '70vh', 'important');
        table.setData(sorted);
        requestAnimationFrame(() => {
            if (sorted.length > table.rowPool.length) return;
            const renderedHeight = Math.ceil(table.tableWrap.getBoundingClientRect().height);
            const needsHorizontalScroll = table.viewport.scrollWidth > table.viewport.clientWidth;
            const fittedHeight = renderedHeight + (needsHorizontalScroll ? scrollbarHeight : 0) + 2;
            table.viewport.style.setProperty('height', `${Math.min(fittedHeight, maxHeight)}px`, 'important');
            table.onScroll();
        });
    }

    window.changeWeek = (delta) => {
        const current = _picker.selectedDates[0] || new Date();
        current.setDate(current.getDate() + (delta * 7));
        setWeekRange(current);
        window.renderPublicView();
    };

    function setWeekRange(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        const monday = new Date(d.setDate(diff));
        monday.setHours(12, 0, 0, 0);
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        _picker.setDate([monday, sunday]);
    }

    window.goToday = () => {
        setWeekRange(new Date());
        window.renderPublicView();
    };

    document.addEventListener('DOMContentLoaded', async () => {
        applyTheme(localStorage.getItem('public-theme') || 'day');
        _picker = flatpickr("#dateRange", {
            mode: "range",
            dateFormat: "Y-m-d",
            locale: { ...flatpickr.l10ns.es, firstDayOfWeek: 1 },
            onChange: () => window.renderPublicView()
        });
        window.goToday();
    });
  </script>
</body>
</html>
