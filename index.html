<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TurnosWeb — Cuadrante Público</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="flatpickr.min.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
      :root { 
          --accent: #1677ff; 
          --accent-hover: #4096ff; 
          --border: #e2e8f0; 
          --bg: #f4f7fb; 
          --bg2: #ffffff;
          --bg3: #f8fafc;
          --surface: #ffffff;
          --text: #1e2a3a; 
          --text-dim: #64748b;
          --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      }
      
      body { 
          background: var(--bg); 
          font-family: 'Inter', -apple-system, system-ui, sans-serif; 
          color: var(--text); 
          margin: 0; 
          overflow-x: hidden;
      }

      header {
          background: #1a1d21;
          color: white;
          padding: 12px 30px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          position: sticky;
          top: 0;
          z-index: 1000;
          box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      }

      .nav-btn { 
          background: rgba(255,255,255,0.1); 
          color: white; 
          border: 1px solid rgba(255,255,255,0.1); 
          padding: 8px 16px; 
          border-radius: 8px; 
          font-weight: 700; 
          cursor: pointer; 
          transition: 0.2s; 
          font-size: 0.8rem; 
          text-decoration: none; 
          display: inline-flex; 
          align-items: center; 
          gap: 6px; 
      }
      .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
      
      .preview-week.week { 
          background: var(--surface); 
          border: 1px solid var(--border); 
          border-radius: 20px; 
          margin-bottom: 2rem; 
          overflow: hidden; 
          box-shadow: var(--shadow-sm);
      }

      .preview-week-header.week-head { 
          display: flex; 
          align-items: center; 
          gap: 12px; 
          padding: 1.2rem 1.5rem; 
          border-bottom: 1px solid var(--border); 
          background: linear-gradient(135deg, #f8fafc, #ffffff);
      }
      .preview-week-header.week-head img {
          width: 40px; height: 40px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(0,0,0,0.05);
      }
      .preview-week-header.week-head h3 { 
          margin: 0; 
          font-size: 1.1rem; 
          font-weight: 800; 
          color: var(--text); 
          font-family: 'Outfit', sans-serif;
          letter-spacing: -0.01em;
      }

      .viewport { border-radius: 0 !important; border: none !important; box-shadow: none !important; min-height: unset !important; height: auto !important; overflow: visible !important; }
      .preview-table-v2 { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; }
      .preview-table-v2 th { background: var(--bg3); padding: 12px 8px; border-bottom: 1px solid var(--border); font-weight: 700; position: sticky; top: -1px; z-index: 100; }
      .preview-table-v2 td { padding: 4px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
      
      .emp-cell { padding-left: 20px !important; min-width: 180px; z-index: 50; }
      .emp-logo { width: 24px; height: 24px; border-radius: 4px; margin-right: 10px; vertical-align: middle; display: none; }
      .emp-badges { display: flex; gap: 4px; margin-top: 2px; }
      .emp-badge { font-size: 0.65rem; font-weight: 800; padding: 1px 6px; border-radius: 10px; background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
      
      .v-pill { 
          padding: 8px 4px; border-radius: 12px; font-weight: 700; font-size: 0.75rem; text-align: center; 
          transition: all 0.2s; cursor: default; width: 95%; margin: 0 auto;
      }
      .v-mañana .v-pill   { background: #ebfbee; color: #2f9e44; border: 1px solid rgba(47,158,68,0.1); }
      .v-tarde .v-pill    { background: #fff9db; color: #f08c00; border: 1px solid rgba(240,140,0,0.1); }
      .v-noche .v-pill    { background: #edf2ff; color: #364fc7; border: 1px solid rgba(54,79,199,0.1); }
      .v-descanso .v-pill { background: #fff5f5; color: #fa5252; border: 1px solid rgba(250,82,82,0.1); }
      .v-vac .v-pill      { background: #e3fafc; color: #0b7285; border: 1px solid rgba(11,114,133,0.1); }
      .v-baja .v-pill     { background: #fff5f5; color: #fa5252; border: 1px dashed #fa5252; }
      .v-perm .v-pill     { background: #f3f0ff; color: #7048e8; border: 1px solid rgba(112,72,232,0.1); }
      .v-cambio .v-pill   { background: #e7f1ff; color: #0d6efd; border: 1px solid #0d6efd; }
      .v-empty .v-pill    { opacity: 0.2; background: #eee; height: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <div style="display:flex; align-items:center; gap:20px;">
      <img src="Logo.png" alt="Logo" style="height:40px; filter:brightness(0) invert(1);">
      <div>
        <div style="font-size:1.2rem; font-weight:800; font-family:'Outfit', sans-serif; letter-spacing:-0.02em;">Cuadrante Público</div>
        <div style="font-size:0.7rem; opacity:0.6; text-transform:uppercase; letter-spacing:0.05em; font-weight:700;">Disponibilidad en tiempo real</div>
      </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="nav-btn" onclick="changeWeek(-1)">← Semana</button>
      <button class="nav-btn" onclick="goToday()">Hoy</button>
      <button class="nav-btn" onclick="changeWeek(1)">Semana →</button>
      <div style="width:1px; height:24px; background:rgba(255,255,255,0.2); margin:0 10px;"></div>
      <select id="hotelSelect" onchange="renderPublicView()" style="background:#2a2e35; color:white; border:1px solid #444; border-radius:8px; padding:8px 12px; font-weight:600; font-size:0.85rem;">
        <option value="">Todos los Hoteles</option>
      </select>
      <input type="text" id="dateRange" style="background:#2a2e35; color:white; border:1px solid #444; border-radius:8px; padding:8px 12px; width:200px; font-weight:600; font-size:0.85rem;">
      <a href="solicitud.html" style="background:var(--accent); color:white; text-decoration:none; padding:8px 16px; border-radius:8px; font-weight:700; font-size:0.85rem; margin-left:10px;">🔄 Solicitar Cambio</a>
    </div>
  </header>
  
  <main id="app" style="padding:32px 40px;"></main>
  
  <script src="supabase.js"></script>
  <script src="localforage.js"></script>
  <script src="flatpickr.js"></script>
  <script src="flatpickr_es.js"></script>
  <script src="virtualizer.js?v=8.5"></script>
  <script src="supabase-config.js?v=9.8"></script>
  <script src="supabase-dao.js?v=9.13"></script>
  
  <script>
    const $ = (s) => document.querySelector(s);
    let _picker;
    const logoFor = (h) => h.toLowerCase().includes('guadiana') ? 'guadiana logo.jpg' : 'cumbria logo.jpg';
    
    window.renderPublicView = async () => {
        const area = $('#app');
        const selHotel = $('#hotelSelect').value;
        const rangeStr = $('#dateRange').value;
        
        let startIso, endIso;
        if (rangeStr.includes(" a ")) {
            [startIso, endIso] = rangeStr.split(" a ");
        } else {
            const d = new Date();
            const off = (d.getDay() === 0 ? -6 : 1 - d.getDay());
            d.setDate(d.getDate() + off);
            startIso = d.toISOString().split('T')[0];
            const endD = new Date(d);
            endD.setDate(endD.getDate() + 6);
            endIso = endD.toISOString().split('T')[0];
        }

        area.innerHTML = `<div style="padding:4rem; text-align:center; opacity:0.5; font-weight:700;">Sincronizando cuadrante...</div>`;

        try {
            let data = await window.TurnosDB.fetchRangoCalculado(startIso, endIso);
            if (selHotel) data = data.filter(t => t.hotel_id === selHotel);
            const profiles = await window.TurnosDB.getEmpleados();

            area.innerHTML = '';
            const hotelsFound = [...new Set(data.map(t => t.hotel_id))].sort();
            if (selHotel && !hotelsFound.includes(selHotel)) hotelsFound.push(selHotel);
            
            if (hotelsFound.length === 0) {
                area.innerHTML = `<div style="padding:4rem; text-align:center; opacity:0.5;">No hay turnos registrados para este periodo en la nube.</div>`;
                return;
            }

            for (const hName of hotelsFound) {
                const hShifts = data.filter(t => t.hotel_id === hName);
                const safeId = hName.replace(/[^a-z0-9]/gi, '-');
                const card = document.createElement('div');
                card.className = 'preview-week week';
                card.innerHTML = `
                    <div class="preview-week-header week-head">
                        <img src="${logoFor(hName)}">
                        <h3>${hName.toUpperCase()}</h3>
                    </div>
                    <div id="grid-container-${safeId}" style="padding:0;"></div>
                `;
                area.appendChild(card);
                const container = card.querySelector(`#grid-container-${safeId}`);
                await renderEnContenedor(container, startIso, endIso, hShifts, hName, profiles);
            }
        } catch (e) {
            console.error(e);
            area.innerHTML = `<div style="padding:4rem; text-align:center; color:red;">Error de conexión: ${e.message}</div>`;
        }
    };

    async function renderEnContenedor(container, inicio, fin, hotelData, hotelName, profiles) {
        const columns = [];
        let curr = new Date(inicio + "T12:00:00");
        const end = new Date(fin + "T12:00:00");
        while (curr <= end) {
            const iso = curr.toISOString().split('T')[0];
            const dayNames = ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'];
            const monthNames = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            columns.push({
                dbFecha: iso,
                title: dayNames[curr.getDay()],
                subtitle: `${curr.getDate()}/${monthNames[curr.getMonth()]}/${curr.getFullYear().toString().slice(-2)}`,
                isWeekend: curr.getDay() === 0 || curr.getDay() === 6,
                isToday: iso === new Date().toISOString().split('T')[0]
            });
            curr.setDate(curr.getDate() + 1);
        }

        const table = new window.VirtualTable(container, { columns, rowHeight: 56 });
        // --- LÓGICA DE FUSIÓN Y ORDENACIÓN (IGUAL QUE ADMIN) ---
        const empMap = new Map();
        hotelData.forEach(t => {
            if (t.empleado_id) {
                const norm = window.TurnosDB.normalizeString(t.empleado_id);
                if (!empMap.has(norm)) empMap.set(norm, t.empleado_id);
            }
            if (t.sustituto) {
                const normS = window.TurnosDB.normalizeString(t.sustituto);
                if (!empMap.has(normS)) empMap.set(normS, t.sustituto);
            }
        });
        
        const allUniqueNorm = Array.from(empMap.keys());

        // Contar ausencias para mover al fondo (como en Admin)
        const absenceCount = {};
        allUniqueNorm.forEach(normName => {
            absenceCount[normName] = 0;
            columns.forEach(c => {
                const d = hotelData.find(s => window.TurnosDB.normalizeString(s.empleado_id) === normName && s.fecha === c.dbFecha);
                if (d && d.tipo !== 'NORMAL' && !d.tipo.includes('CT')) absenceCount[normName]++;
            });
        });

        const isTotalAbsent = (norm) => absenceCount[norm] >= columns.length;

        const sortedNorm = allUniqueNorm.sort((a,b) => {
            // 1. Ausentes totales al final
            const aAb = isTotalAbsent(a), bAb = isTotalAbsent(b);
            if (aAb !== bAb) return aAb ? 1 : -1;
            
            // 2. Orden de base de datos
            const pA = profiles.find(p => window.TurnosDB.normalizeString(p.id) === a || window.TurnosDB.normalizeString(p.nombre) === a);
            const pB = profiles.find(p => window.TurnosDB.normalizeString(p.id) === b || window.TurnosDB.normalizeString(p.nombre) === b);
            return (pA?.orden ?? 999) - (pB?.orden ?? 999);
        });

        const rows = sortedNorm.map(normName => {
            const originalName = empMap.get(normName);
            const cells = columns.map(c => {
                const direct = hotelData.find(s => window.TurnosDB.normalizeString(s.empleado_id) === normName && s.fecha === c.dbFecha);
                if (direct) return { turno: direct.turno, tipo: direct.tipo, sustituto: direct.sustituto };
                const substituted = hotelData.find(s => window.TurnosDB.normalizeString(s.sustituto) === normName && s.fecha === c.dbFecha);
                if (substituted) return { turno: substituted.turno, tipo: 'NORMAL', isSub: true, subFor: substituted.empleado_id };
                return { turno: '', tipo: 'NORMAL' };
            });
            return { empName: originalName, cells, hotel_id: hotelName };
        });
        table.setData(rows);
    }

    window.changeWeek = (delta) => {
        const current = _picker.selectedDates[0] || new Date();
        current.setDate(current.getDate() + (delta * 7));
        const monday = new Date(current);
        monday.setDate(monday.getDate() + (monday.getDay() === 0 ? -6 : 1 - monday.getDay()));
        const sunday = new Date(monday);
        sunday.setDate(sunday.getDate() + 6);
        _picker.setDate([monday, sunday]);
        window.renderPublicView();
    };

    window.goToday = () => {
        const d = new Date();
        const monday = new Date(d);
        monday.setDate(monday.getDate() + (monday.getDay() === 0 ? -6 : 1 - monday.getDay()));
        const sunday = new Date(monday);
        sunday.setDate(sunday.getDate() + 6);
        _picker.setDate([monday, sunday]);
        window.renderPublicView();
    };

    document.addEventListener('DOMContentLoaded', async () => {
        _picker = flatpickr("#dateRange", {
            mode: "range",
            dateFormat: "Y-m-d",
            locale: { ...flatpickr.l10ns.es, firstDayOfWeek: 1 },
            onChange: () => window.renderPublicView()
        });
        const hotels = await window.TurnosDB.getHotels();
        $('#hotelSelect').innerHTML = `<option value="">Todos los Hoteles</option>` + 
            hotels.map(h => `<option value="${h}">${h}</option>`).join('');
        window.goToday();
    });
  </script>
</body>
</html>
