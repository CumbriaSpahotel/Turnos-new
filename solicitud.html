<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Cambio de Turno — TurnosWeb Premium</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #10b981;
            --surface: rgba(255, 255, 255, 0.95);
            --bg-page: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
        }

        .ct-wrapper {
            padding: 1rem;
            max-width: 850px;
            margin: 0 auto;
        }

        .ct-container {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ct-header {
            padding: 2.5rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            position: relative;
        }

        .ct-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(255,255,255,0.1));
        }

        .ct-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .ct-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ct-header p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 6px;
            font-weight: 400;
        }

        .ct-body {
            padding: 2rem 3rem;
        }

        @media (max-width: 768px) {
            .ct-body { padding: 2rem 1.5rem; }
        }

        legend {
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        legend::after {
            content: '';
            height: 1px;
            background: var(--border);
            flex: 1;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.2rem; }
        .field label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); padding-left: 4px; }

        select, input[type="text"], input[type="date"], textarea {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        select:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .shift-row {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            position: relative;
            transition: 0.3s;
        }

        .shift-row:hover {
            border-color: var(--primary-light);
            box-shadow: 0 8px 20px -10px rgba(0,0,0,0.05);
        }

        .shift-grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr 1fr 1.4fr auto;
            gap: 1rem;
            align-items: flex-end;
        }

        .shift-title {
            position: absolute;
            top: -12px; left: 24px;
            background: white;
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .btn-delete {
            background: #ffe4e6;
            color: #e11d48;
            border: none;
            width: 48px; height: 48px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-delete:hover { background: #e11d48; color: white; transform: rotate(90deg); }

        .btn-add-date {
            background: white;
            color: var(--primary);
            border: 2px dashed #cbd5e1;
            padding: 1.25rem;
            width: 100%;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 700;
            margin: 1rem 0 3rem 0;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-add-date:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            color: var(--primary);
            padding-left: 2rem;
        }

        .agreement-card {
            background: #f0fdf9;
            border: 2px solid #ccfbf1;
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            display: flex;
            gap: 1rem;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .agreement-card:hover { border-color: var(--accent); background: #f0fdf9; }
        .agreement-card input { width: 22px; height: 22px; accent-color: var(--accent); cursor: pointer; }
        .agreement-card span { font-weight: 500; font-size: 0.85rem; color: #065f46; line-height: 1.4; }

        .form-actions { margin-top: 2rem; }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 1.2rem 2rem;
            width: 100%;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.4);
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.5); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: #ffffff;
            color: var(--text-main);
            border: 2px solid #e2e8f0;
            padding: 1.2rem 2rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%;
        }
        .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-2px); }

        .btn-back {
            position: absolute;
            top: 2rem; left: 2rem;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
            z-index: 10;
        }
        .btn-back:hover { background: rgba(255,255,255,0.2); transform: translateX(-5px); }

        .loading-dot {
            width: 8px; height: 8px; background: white; border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        #success-screen {
            display: none;
            text-align: center;
            padding: 5rem 2rem;
            animation: fadeIn 0.8s ease-out;
        }
        .success-icon {
            width: 100px; height: 100px;
            background: #dcfce7; color: #166534;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin: 0 auto 2.5rem;
            box-shadow: 0 10px 30px rgba(22, 101, 52, 0.2);
        }
        .success-content h2 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; color: #064e3b; margin: 0 0 1rem; }
        .success-content p { color: #065f46; font-size: 1.1rem; max-width: 400px; margin: 0 auto 3rem; line-height: 1.6; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .shift-detecting {
            position: absolute;
            right: 15px; bottom: 15px;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 700;
            display: flex; align-items: center; gap: 5px;
            opacity: 0;
            transition: 0.3s;
        }
        .is-loading .shift-detecting { opacity: 1; }

        @media (max-width: 768px) {
            .input-grid, .shift-grid { grid-template-columns: 1fr; }
            .ct-header { padding: 3rem 1.5rem; }
            .ct-header h1 { font-size: 2rem; }
            .shift-grid .field:nth-child(2),
            .shift-grid .field:nth-child(3) { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="ct-wrapper">
        <div class="ct-container">
            <header class="ct-header">
                <a href="index.html" class="btn-back">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                    Volver
                </a>
                <img src="Logo.png" class="ct-logo" alt="Logo">
                <div style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 0.5rem; color: var(--primary-light);">Oficial</div>
                <h1>Cambio de Turno</h1>
                <p id="hotel-labels">Sercotel Guadiana & Cumbria Spa&Hotel</p>
            </header>

            <div class="ct-body">
                <form id="form-solicitud">
                    <fieldset style="border:none; padding:0; margin:0;">
                        <legend>01. CONFIGURACIÓN</legend>
                        
                        <div class="field" style="max-width: 350px;">
                            <label>Centro de Trabajo</label>
                            <select id="sel_hotel" required>
                                <option value="">— Seleccione Hotel —</option>
                                <option value="Sercotel Guadiana">Sercotel Guadiana</option>
                                <option value="Cumbria Spa&Hotel">Cumbria Spa&Hotel</option>
                            </select>
                        </div>

                        <div class="input-grid">
                            <div class="field">
                                <label>Persona Solicitante</label>
                                <select id="sel_solicitante" required disabled>
                                    <option value="">— Seleccione Hotel —</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Compañero/a que acepta</label>
                                <select id="sel_companero" required disabled>
                                    <option value="">— Seleccione Hotel —</option>
                                </select>
                            </div>
                        </div>

                        <label class="agreement-card">
                            <input type="checkbox" id="check_acuerdo" required>
                            <span>Confirmamos que este intercambio de turnos es de mutuo acuerdo y se realiza de forma voluntaria por ambas partes.</span>
                        </label>
                    </fieldset>

                    <fieldset style="border:none; padding:0; margin:2.5rem 0 0 0;">
                        <legend>02. DETALLES DE LOS TURNOS</legend>
                        
                        <div id="items_container">
                            <!-- Template de Fila -->
                            <div class="shift-row fade-in">
                                <div class="shift-title">INTERCAMBIO #1</div>
                                <div class="shift-grid">
                                    <div class="field">
                                        <label>Fecha</label>
                                        <input type="date" class="v_fecha" required onchange="window.autoFillShifts(this)">
                                    </div>
                                    <div class="field">
                                        <label>Mi Turno Actual</label>
                                        <select class="v_origen" required>
                                            <option value="">—</option>
                                            <option>Mañana</option>
                                            <option>Tarde</option>
                                            <option>Noche</option>
                                            <option>Descanso</option>
                                        </select>
                                    </div>
                                    <div class="field">
                                        <label>Turno Recibido</label>
                                        <select class="v_destino" required>
                                            <option value="">—</option>
                                            <option>Mañana</option>
                                            <option>Tarde</option>
                                            <option>Noche</option>
                                            <option>Descanso</option>
                                        </select>
                                    </div>
                                    <div class="field">
                                        <label>Notas / Motivo</label>
                                        <input type="text" class="v_nota" placeholder="Opcional...">
                                    </div>
                                    <button type="button" class="btn-delete" title="Quitar fecha" onclick="quitarFila(this)">
                                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div class="shift-detecting">
                                    <div class="loading-dot"></div> Detectando turnos...
                                </div>
                            </div>
                        </div>

                        <button type="button" class="btn-add-date" onclick="nuevaFila()">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                            AÑADIR OTRA FECHA
                        </button>

                        <div class="field">
                            <label>Comentarios Adicionales</label>
                            <textarea id="obs" rows="3" placeholder="Información extra para administración..."></textarea>
                        </div>
                    </fieldset>

                    <div class="form-actions">
                        <button type="submit" id="btn_submit" class="btn-submit">
                            ENVIAR SOLICITUD A REVISIÓN
                        </button>
                    </div>
                </form>

                <div id="success-screen">
                    <div class="success-icon">✓</div>
                    <div class="success-content">
                        <h2>¡Solicitud Enviada!</h2>
                        <p>Tu petición ha sido registrada correctamente. Te avisaremos cuando sea procesada por la administración.</p>
                        <div style="display: flex; flex-direction: column; gap: 1rem; max-width: 350px; margin: 0 auto;">
                            <button class="btn-submit" style="padding:1.2rem 2rem;" onclick="location.reload()">REALIZAR OTRA PETICIÓN</button>
                            <button class="btn-secondary" onclick="window.location.href='index.html'">VOLVER AL CUADRANTE</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="supabase-config.js?v=9.8"></script>
    <script src="supabase-dao.js?v=9.8"></script>

    <script>
        const $ = s => document.querySelector(s);
        let _emps = [];

        async function startup() {
            try {
                _emps = await window.TurnosDB.getEmpleados();
                $("#sel_hotel").addEventListener("change", populateEmployeeDrops);
                $("#sel_solicitante").addEventListener("change", reTriggerAllFills);
                $("#sel_companero").addEventListener("change", reTriggerAllFills);
            } catch (e) {
                console.error("Error al conectar con DB:", e);
                alert("Error de conexión. Por favor avisar a administración.");
            }
        }

        function populateEmployeeDrops() {
            const h = $("#sel_hotel").value;
            const s1 = $("#sel_solicitante");
            const s2 = $("#sel_companero");

            if (!h) {
                s1.disabled = s2.disabled = true;
                return;
            }

            const hotelKey = h.toLowerCase().includes('cumbria') ? 'cumbria' : 'guadiana';
            const filtered = _emps.filter(e => {
                const hotelVal = (e.hotel_id || "").toLowerCase();
                return e.activo !== false && hotelVal.includes(hotelKey);
            }).sort((a,b) => a.nombre.localeCompare(b.nombre));

            const options = `<option value="">— Seleccione Empleado —</option>` + 
                            filtered.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
            
            s1.innerHTML = s2.innerHTML = options;
            s1.disabled = s2.disabled = false;
        }

        function reTriggerAllFills() {
            document.querySelectorAll(".v_fecha").forEach(input => {
                if (input.value) window.autoFillShifts(input);
            });
        }

        window.autoFillShifts = async (input) => {
            const row = input.closest(".shift-row");
            const solId = $("#sel_solicitante").value;
            const compId = $("#sel_companero").value;
            const date = input.value;
            
            if (!date || (!solId && !compId)) return;

            row.classList.add("is-loading");

            try {
                // Obtenemos los turnos calculados (reales) para ese día
                const turnosData = await window.TurnosDB.fetchRangoCalculado(date, date);
                
                if (solId) {
                    const matchSol = turnosData.find(t => t.empleado_id === solId);
                    if (matchSol) {
                        row.querySelector(".v_origen").value = mapShiftLabel(matchSol.turno || matchSol.tipo);
                    }
                }

                if (compId) {
                    const matchComp = turnosData.find(t => t.empleado_id === compId);
                    if (matchComp) {
                        row.querySelector(".v_destino").value = mapShiftLabel(matchComp.turno || matchComp.tipo);
                    }
                }
            } catch (e) { 
                console.warn("AutoFill Error:", e); 
            } finally {
                setTimeout(() => row.classList.remove("is-loading"), 400);
            }
        };

        function mapShiftLabel(t) {
            const s = String(t || "").toUpperCase();
            if (s.startsWith('M')) return 'Mañana';
            if (s.startsWith('T')) return 'Tarde';
            if (s.startsWith('N')) return 'Noche';
            if (s.startsWith('D')) return 'Descanso';
            if (s.includes('VAC') || s.includes('BAJA') || s.includes('PERM')) return 'Descanso';
            return 'Mañana'; 
        }

        function nuevaFila() {
            const container = $("#items_container");
            const count = document.querySelectorAll(".shift-row").length + 1;
            
            const div = document.createElement("div");
            div.className = "shift-row fade-in";
            div.innerHTML = `
                <div class="shift-title">INTERCAMBIO #${count}</div>
                <div class="shift-grid">
                    <div class="field">
                        <label>Fecha</label>
                        <input type="date" class="v_fecha" required onchange="window.autoFillShifts(this)">
                    </div>
                    <div class="field">
                        <label>Mi Turno Actual</label>
                        <select class="v_origen" required>
                            <option value="">—</option>
                            <option>Mañana</option>
                            <option>Tarde</option>
                            <option>Noche</option>
                            <option>Descanso</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Turno Recibido</label>
                        <select class="v_destino" required>
                            <option value="">—</option>
                            <option>Mañana</option>
                            <option>Tarde</option>
                            <option>Noche</option>
                            <option>Descanso</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Notas / Motivo</label>
                        <input type="text" class="v_nota" placeholder="Opcional...">
                    </div>
                    <button type="button" class="btn-delete" title="Quitar fecha" onclick="quitarFila(this)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="shift-detecting">
                    <div class="loading-dot"></div> Detectando turnos...
                </div>
            `;
            container.appendChild(div);
        }

        function quitarFila(btn) {
            const all = document.querySelectorAll(".shift-row");
            if (all.length > 1) {
                const row = btn.closest(".shift-row");
                row.style.opacity = '0';
                row.style.transform = 'translateX(20px)';
                setTimeout(() => {
                    row.remove();
                    // Renumerar títulos
                    document.querySelectorAll(".shift-row").forEach((r, i) => {
                        r.querySelector(".shift-title").textContent = `INTERCAMBIO #${i+1}`;
                    });
                }, 300);
            }
        }

        $("#form-solicitud").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = $("#btn_submit");
            const hotel = $("#sel_hotel").value;
            const sol = $("#sel_solicitante").value;
            const comp = $("#sel_companero").value;
            
            if (sol === comp) return alert("No puedes realizar un intercambio contigo mismo/a.");
            
            btn.disabled = true;
            btn.innerHTML = `<div class="loading-dot"></div> ENVIANDO...`;

            const items = [];
            document.querySelectorAll(".shift-row").forEach(row => {
                items.push({
                    fecha: row.querySelector(".v_fecha").value,
                    origen: row.querySelector(".v_origen").value,
                    destino: row.querySelector(".v_destino").value,
                    nota: row.querySelector(".v_nota").value
                });
            });

            const payload = {
                hotel: hotel,
                solicitante: sol,
                companero: comp,
                fechas: items,
                observaciones: $("#obs").value,
                estado: 'pendiente'
            };

            try {
                const { error } = await window.supabase.from('peticiones_cambio').insert([payload]);
                if (error) throw error;
                
                $("#form-solicitud").style.display = "none";
                $("#success-screen").style.display = "block";
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                alert("Error técnico al enviar: " + err.message);
                btn.disabled = false;
                btn.innerHTML = `ENVIAR SOLICITUD A REVISIÓN`;
            }
        });

        document.addEventListener("DOMContentLoaded", startup);
    </script>
</body>
</html>
