<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnosWeb — Gestión de Vacaciones</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .nav-item.active { background: var(--accent-dim); color: var(--accent); border-right: 3px solid var(--accent); }
    </style>
</head>
<body class="light-mode">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="Logo.png" alt="Logo" class="sidebar-logo">
            <div class="brand-text">
                <div class="sidebar-title">TurnosWeb</div>
                <div class="sidebar-subtitle">PANEL ADMIN</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-label">CUADRANTE</div>
            <a href="admin.html" class="nav-item">🏠 <span class="nav-label">Inicio / Cargar</span></a>
            <a href="admin.html#preview" class="nav-item">📅 <span class="nav-label">Vista Previa</span></a>
            <a href="admin.html#employees" class="nav-item">👥 <span class="nav-label">Empleados</span></a>
            <div class="nav-group-label">AUSENCIAS</div>
            <a href="vacaciones.html" class="nav-item active">🏖️ <span class="nav-label">Vacaciones</span></a>
            <a href="bajas.html" class="nav-item">🏥 <span class="nav-label">Bajas y Permisos</span></a>
            <a href="cambios.html" class="nav-item">🔄 <span class="nav-label">Cambios de Turno</span></a>
            <div class="nav-group-label">SISTEMA</div>
            <a href="admin.html#export" class="nav-item">📦 <span class="nav-label">Configuración</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </aside>

    <main class="main-wrap">
        <section class="section active">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Gestión de Vacaciones</h1>
                    <p class="page-subtitle">Periodos de vacaciones registrados</p>
                </div>
                <div style="display:flex; gap:10px; margin-left:auto; align-items:center;">
                    <div id="rangeTrigger" class="date-range-picker-premium" style="display:flex; align-items:center; gap:10px; background:var(--bg3); border:1px solid var(--border); padding:8px 15px; border-radius:12px; cursor:pointer; min-width:260px;">
                        <span style="font-size:1.1rem;" data-toggle>📅</span>
                        <div style="display:flex; flex-direction:column;" data-toggle>
                            <span style="font-size:0.6rem; color:var(--text-dim); font-weight:800; text-transform:uppercase; letter-spacing:0.05em;">Periodo Seleccionado</span>
                            <span id="rangeLabel" style="font-size:0.85rem; font-weight:700; color:var(--accent);">Seleccionar Rango...</span>
                        </div>
                        <input type="text" id="filterDateRange" data-input style="display:none;">
                    </div>
                </div>
                <div id="syncStatus" class="status-badge-premium" style="margin-left:15px; display:flex; align-items:center; gap:8px;">
                    <span id="syncDot" style="width:8px; height:8px; border-radius:50%; background:#ff9800;"></span>
                    <span id="syncText">Conectando...</span>
                </div>
            </header>
            <div id="vacationsBody" class="glass-panel" style="min-height:500px; padding:1.5rem;">
                <!-- Dinámico -->
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="supabase-config.js?v=7.5"></script>
    <script src="supabase-dao.js?v=7.5"></script>
    <script>
        const $ = (s) => document.querySelector(s);
        let CURRENT_RANGE = { start: '', end: '' };

        async function renderVacations() {
            if (!window.TurnosDB) return;
            const container = $('#vacationsBody');
            if (!container) return;

            try {
                const data = await window.TurnosDB.fetchTipo('VAC', CURRENT_RANGE.start, CURRENT_RANGE.end);
                if (data.length === 0) {
                    container.innerHTML = `<div style="padding:5rem; text-align:center; opacity:0.5;">No hay vacaciones registradas en este periodo.</div>`;
                    return;
                }

                data.sort((a,b) => b.fecha.localeCompare(a.fecha));

                const rows = data.map(v => `
                    <tr>
                        <td style="padding:1rem;">🏖️ <span style="font-weight:600; color:var(--accent);">VACACIONES</span></td>
                        <td style="padding:1rem;"><b>${new Date(v.fecha).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric'})}</b></td>
                        <td style="padding:1rem; color:var(--text-muted);">${v.hotel_id}</td>
                        <td style="padding:1rem;"><b>${v.empleado_id}</b></td>
                        <td style="padding:1rem; color:var(--text-muted); font-size:0.85rem;">${v.turno || 'Sin observaciones'}</td>
                    </tr>
                `).join('');

                container.innerHTML = `
                    <div class="table-container">
                        <table class="preview-table" style="width:100%;">
                            <thead>
                                <tr>
                                    <th style="text-align:left;">Tipo</th>
                                    <th style="text-align:left;">Fecha</th>
                                    <th style="text-align:left;">Hotel</th>
                                    <th style="text-align:left;">Empleado</th>
                                    <th style="text-align:left;">Observaciones</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div style="padding:2rem; color:red;">Error: ${err.message}</div>`;
            }
        }

        window.initSupabaseSync = async () => {
            const syncText = $('#syncText');
            const syncDot = $('#syncDot');
            try {
                await renderVacations();
                if (syncText) syncText.innerText = "Supabase Conectado";
                if (syncDot) syncDot.style.background = "#10e898";
            } catch (e) {
                if (syncText) syncText.innerText = "Error Conexión";
            }
        };

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const startOfYear = new Date(today.getFullYear(), 0, 1);
            const endOfYear = new Date(today.getFullYear(), 11, 31);

            flatpickr("#rangeTrigger", {
                wrap: true,
                mode: "range",
                locale: "es",
                dateFormat: "Y-m-d",
                defaultDate: [startOfYear, endOfYear],
                onChange: (selectedDates) => {
                    if (selectedDates.length === 2) {
                        CURRENT_RANGE.start = selectedDates[0].toISOString().split('T')[0];
                        CURRENT_RANGE.end = selectedDates[1].toISOString().split('T')[0];
                        $('#rangeLabel').textContent = `${selectedDates[0].toLocaleDateString('es-ES')} — ${selectedDates[1].toLocaleDateString('es-ES')}`;
                        renderVacations();
                    }
                },
                onReady: (selectedDates) => {
                    if (selectedDates.length === 2) {
                        CURRENT_RANGE.start = selectedDates[0].toISOString().split('T')[0];
                        CURRENT_RANGE.end = selectedDates[1].toISOString().split('T')[0];
                        $('#rangeLabel').textContent = `${selectedDates[0].toLocaleDateString('es-ES')} — ${selectedDates[1].toLocaleDateString('es-ES')}`;
                        renderVacations();
                    }
                }
            });

            window.initSupabaseSync();
        });
    </script>
</body>
</html>
