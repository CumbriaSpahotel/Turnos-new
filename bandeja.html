<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja de Mensajes — TurnosWeb</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        .nav-item.active { background: var(--accent-dim); color: var(--accent); border-right: 3px solid var(--accent); }
        
        .message-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            position: relative;
            box-shadow: var(--shadow);
        }
        .message-card.unread { border-left: 5px solid var(--accent); background: rgba(14, 165, 233, 0.02); }
        .message-card:hover { transform: translateX(8px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1); }

        .msg-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .msg-icon.info { background: #e0f2fe; color: #0ea5e9; }
        .msg-icon.aviso { background: #fff7ed; color: #f97316; }
        .msg-icon.urgente { background: #fef2f2; color: #ef4444; }

        .msg-content { flex-grow: 1; }
        .msg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .msg-title { font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.1rem; color: var(--text); }
        .msg-meta { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; }
        .msg-body { font-size: 0.95rem; color: var(--text); line-height: 1.6; margin: 10px 0; }

        .msg-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-msg {
            background: white;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-msg:hover { background: var(--bg); color: var(--text); border-color: var(--accent); }
        .btn-delete:hover { border-color: #ef4444; color: #ef4444; background: #fff1f2; }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat-pill {
            background: white;
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }
        .stat-val { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text); }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

        .emisor-tag {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--accent);
            background: rgba(14, 165, 233, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body class="light-mode">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="Logo.png" alt="Logo" class="sidebar-logo">
            <div class="brand-text">
                <div class="sidebar-title">TurnosWeb</div>
                <div class="sidebar-subtitle">PANEL ADMIN</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-label">CUADRANTE</div>
            <a href="admin.html" class="nav-item">🏠 <span class="nav-label">Inicio / Cargar</span></a>
            <a href="admin.html#section-preview" class="nav-item">📅 <span class="nav-label">Vista Previa</span></a>
            <a href="admin.html#section-employees" class="nav-item">👥 <span class="nav-label">Empleados</span></a>
            <div class="nav-group-label">AUSENCIAS</div>
            <a href="vacaciones.html" class="nav-item">🏖️ <span class="nav-label">Vacaciones</span></a>
            <a href="bajas.html" class="nav-item">🏥 <span class="nav-label">Bajas y Permisos</span></a>
            <a href="cambios.html" class="nav-item">🔄 <span class="nav-label">Cambios de Turno</span></a>
            <div class="nav-group-label">COMUNICACIÓN</div>
            <a href="solicitudes.html" class="nav-item">📩 <span class="nav-label">Solicitudes</span></a>
            <a href="bandeja.html" class="nav-item active">📫 <span class="nav-label">Bandeja</span></a>
            <div class="nav-group-label">SISTEMA</div>
            <a href="configuracion.html" class="nav-item">📦 <span class="nav-label">Configuración</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>
    </aside>

    <main class="main-wrap">
        <section class="section active">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Bandeja de Mensajes</h1>
                    <p class="page-subtitle">Comunicaciones, alertas y notificaciones del personal</p>
                </div>
                <div id="syncStatus" class="status-badge-premium" style="margin-left:auto;">
                </div>
            </header>

            <div class="stats-bar">
                <div class="stat-pill">
                    <span class="stat-val" id="unreadCount" style="color:var(--accent);">0</span>
                    <span class="stat-label">Sin Leer</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-val" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <button onclick="handleClearAll()" class="btn-msg" style="margin-left:auto; height:fit-content; align-self:center; padding:10px 20px;">🗑️ Vaciar Bandeja</button>
            </div>

            <div id="messagesList" style="min-height:500px;">
                <div style="text-align:center; opacity:0.3; padding:10rem;">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                </div>
            </div>
        </section>
    </main>

    <script src="supabase.js"></script>
    <script src="supabase-dao.js?v=11.1"></script>
    <script src="supabase-config.js?v=11.1"></script>
    <script>
        const $ = (s) => document.querySelector(s);
        
        async function fetchMessages() {
            const list = $('#messagesList');
            try {
                const data = await window.TurnosDB.fetchMensajes();
                
                $('#unreadCount').textContent = data.filter(m => !m.leido).length;
                $('#totalCount').textContent = data.length;

                if (data.length === 0) {
                    list.innerHTML = `
                        <div class="glass-panel" style="text-align:center; opacity:0.5; padding:5rem; border-radius:24px;">
                            <div style="font-size:3rem; margin-bottom:1rem;">📭</div>
                            <h3 style="font-family:'Outfit', sans-serif;">Bandeja de entrada vacía</h3>
                            <p>No hay mensajes ni notificaciones por el momento.</p>
                        </div>`;
                    return;
                }

                list.innerHTML = data.map(msg => `
                    <div class="message-card ${msg.leido ? '' : 'unread'}">
                        <div class="msg-icon ${msg.tipo || 'info'}">
                            ${getIcon(msg.tipo)}
                        </div>
                        <div class="msg-content">
                            <div class="msg-header">
                                <span class="msg-title">${msg.asunto || 'Sin Asunto'}</span>
                                <span class="msg-meta">${new Date(msg.created_at).toLocaleString('es-ES')}</span>
                            </div>
                            <div style="margin-bottom:8px; display:flex; align-items:center; gap:10px;">
                                <span class="emisor-tag">${msg.emisor}</span>
                                ${msg.hotel_id ? `<span style="font-size:0.75rem; font-weight:700; color:var(--text-dim); opacity:0.6;">@ ${msg.hotel_id}</span>` : ''}
                            </div>
                            <div class="msg-body">${msg.cuerpo}</div>
                            <div class="msg-actions">
                                ${!msg.leido ? `<button class="btn-msg" onclick="handleMarkRead('${msg.id}')">👁️ Marcar leído</button>` : ''}
                                <button class="btn-msg btn-delete" onclick="handleDelete('${msg.id}')">🗑️ Eliminar</button>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);
                list.innerHTML = `<div class="alert error">Error: ${err.message}</div>`;
            }
        }

        function getIcon(tipo) {
            if (tipo === 'aviso') return '⚠️';
            if (tipo === 'urgente') return '🚨';
            return '✉️';
        }

        async function handleMarkRead(id) {
            try {
                await window.TurnosDB.marcarMensajeLeido(id);
                fetchMessages();
            } catch (e) { alert(e.message); }
        }

        async function handleDelete(id) {
            if (!confirm("¿Eliminar este mensaje permanentemente?")) return;
            try {
                await window.TurnosDB.eliminarMensaje(id);
                fetchMessages();
            } catch (e) { alert(e.message); }
        }

        async function handleClearAll() {
            if (!confirm("¿Estás seguro de vaciar toda la bandeja de mensajes?")) return;
            alert("Opción no habilitada por seguridad. Elimine uno a uno.");
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('turnosweb_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('turnosweb_theme') || 'light';
            if (savedTheme === 'light') document.body.classList.add('light-mode');
            
            const checkConnect = setInterval(() => {
                if (window.TurnosDB && window.supabase) {
                    clearInterval(checkConnect);
                    if (!window.TurnosDB.client) window.TurnosDB.client = window.supabase;
                    fetchMessages();

                    window.supabase.channel('mensajes_changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'mensajes' }, () => {
                            fetchMessages();
                        }).subscribe();
                }
            }, 300);
        });
    </script>
    <script src="sync-status.js?v=11.1"></script>
</body>
</html>
