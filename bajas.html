<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnosWeb — Bajas y Permisos</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <style>
        .nav-item.active { background: var(--accent-dim); color: var(--accent); border-right: 3px solid var(--accent); }
        .flatpickr-calendar { background: var(--bg2) !important; border: 1px solid var(--border) !important; box-shadow: var(--shadow-lg) !important; }
        .flatpickr-day.selected { background: var(--accent) !important; border-color: var(--accent) !important; }
        .flatpickr-months .flatpickr-month { background: var(--bg2) !important; color: white !important; }
    </style>
</head>
<body class="dark-mode">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="Logo.png" alt="Logo" class="sidebar-logo">
            <div class="brand-text">
                <div class="sidebar-title">TurnosWeb</div>
                <div class="sidebar-subtitle">PANEL ADMIN</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-group-label">CUADRANTE</div>
            <a href="admin.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Inicio / Cargar</span>
            </a>
            <a href="admin.html#preview" class="nav-item">
                <span class="nav-icon">📅</span>
                <span class="nav-label">Vista Previa</span>
            </a>
            <a href="admin.html#employees" class="nav-item">
                <span class="nav-icon">👥</span>
                <span class="nav-label">Empleados</span>
            </a>
            
            <div class="nav-group-label">AUSENCIAS</div>
            <a href="vacaciones.html" class="nav-item">
                <span class="nav-icon">🏖️</span>
                <span class="nav-label">Vacaciones</span>
            </a>
            <a href="bajas.html" class="nav-item active">
                <span class="nav-icon">🏥</span>
                <span class="nav-label">Bajas y Permisos</span>
            </a>
            <a href="cambios.html" class="nav-item">
                <span class="nav-icon">🔄</span>
                <span class="nav-label">Cambios de Turno</span>
            </a>

            <div class="nav-group-label">SISTEMA</div>
            <a href="admin.html#export" class="nav-item">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Configuración</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>
    </aside>

    <main class="main-wrap">
        <section class="section active">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Bajas Médicas y Permisos</h1>
                    <p class="page-subtitle">Registro de ausencias justificadas y permisos retribuidos</p>
                </div>
                <div class="header-controls" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                    <div id="rangeTrigger" class="date-range-picker-premium" style="display:flex; align-items:center; gap:10px; background:var(--bg3); border:1px solid var(--border); padding:8px 15px; border-radius:12px; cursor:pointer; min-width:260px;">
                         <span style="font-size:1.1rem;" data-toggle>📅</span>
                        <div style="display:flex; flex-direction:column;" data-toggle>
                            <span style="font-size:0.6rem; color:var(--text-dim); font-weight:800; text-transform:uppercase; letter-spacing:0.05em;">Periodo Seleccionado</span>
                            <span id="rangeLabel" style="font-size:0.85rem; font-weight:700; color:var(--accent);">Seleccionar Rango...</span>
                        </div>
                        <input type="text" id="filterDateRange" data-input style="display:none;">
                    </div>
                    <input type="text" id="filterEmp" class="btn" oninput="renderBajas()" placeholder="Buscar empleado..." style="flex:1; min-width:150px;">
                    <select id="filterHotel" class="btn" onchange="renderBajas()" style="min-width:140px;">
                        <option value="">— Hotel —</option>
                        <option value="Sercotel Guadiana">Sercotel Guadiana</option>
                        <option value="Cumbria Spa&Hotel">Cumbria Spa&Hotel</option>
                    </select>
                </div>
            </header>

            <div id="bajasList" class="glass-panel" style="min-height:500px;">
                <!-- Contenido generado por JS -->
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const $ = (s) => document.querySelector(s);
        let FULL_DATA = null;
        let CURRENT_RANGE = { start: '', end: '' };

        function renderBajas() {
            const container = $('#bajasList');
            const data = FULL_DATA || JSON.parse(localStorage.getItem('turnosweb_admin_data') || '{"schedule":[]}');
            if (!FULL_DATA && (!data.schedule || data.schedule.length === 0)) {
                container.innerHTML = `<div style="padding:5rem; text-align:center; opacity:0.5;">⌛ Conectando con la base de datos...</div>`;
                return;
            }

            const hotelFilter = $('#filterHotel')?.value || '';
            const empFilter = $('#filterEmp')?.value.toLowerCase() || '';
            const dStart = CURRENT_RANGE.start;
            const dEnd = CURRENT_RANGE.end;
            const todayStr = new Date().toISOString().split('T')[0];

            let bajas = [];
            data.schedule.forEach(g => {
                if (hotelFilter && g.hotel !== hotelFilter) return;
                if (!g.turnos) return;
                g.turnos.forEach(t => {
                    // Filtro de Rango
                    if (dStart && t.fecha < dStart) return;
                    if (dEnd && t.fecha > dEnd) return;

                    let turnLabel = '';
                    if (typeof t.turno === 'string') turnLabel = t.turno;
                    else if (t.turno && typeof t.turno === 'object') {
                        turnLabel = t.turno.TipoInterpretado || t.turno.TurnoOriginal || '';
                    }

                    const l = turnLabel.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
                    // Detectar Bajas (B, Baja, Baja Médica) o Permisos (P, Per, Permiso)
                    const isBaja = l.startsWith('b') || l.includes('baja');
                    const isPermiso = l.startsWith('p') || l.includes('permis');

                    if (isBaja || isPermiso) {
                        if (empFilter && !t.empleado.toLowerCase().includes(empFilter)) return;
                        bajas.push({ 
                            hotel: g.hotel, 
                            fecha: t.fecha, 
                            empleado: t.empleado,
                            tipo: isPermiso ? '📝 PERMISO' : '🏥 BAJA MÉDICA',
                            color: isPermiso ? '#8b5cf6' : '#ef4444'
                        });
                    }
                });
            });

            if (bajas.length === 0) {
                container.innerHTML = `<div style="padding:5rem; text-align:center; opacity:0.5;">No hay bajas o permisos registrados en este periodo.</div>`;
                return;
            }

            bajas.sort((a,b) => b.fecha.localeCompare(a.fecha));

            const rows = bajas.map(b => `
                <tr>
                    <td style="padding:1rem;"><span class="status-badge" style="background:${b.color}22; color:${b.color}; border:none;">${b.tipo}</span></td>
                    <td style="padding:1rem;"><b>${new Date(b.fecha).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric'})}</b></td>
                    <td style="padding:1rem; color:var(--text-muted);">${b.hotel}</td>
                    <td style="padding:1rem;"><b>${b.empleado}</b></td>
                </tr>
            `).join('');

            container.innerHTML = `
                <div class="table-container">
                    <table class="preview-table" style="width:100%;">
                        <thead>
                            <tr>
                                <th style="text-align:left;">Estado / Tipo</th>
                                <th style="text-align:left;">Fecha</th>
                                <th style="text-align:left;">Hotel</th>
                                <th style="text-align:left;">Empleado</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        if (window.firebase && window.firebaseConfig) {
            firebase.initializeApp(window.firebaseConfig);
            firebase.database().ref('turnosweb/data').on('value', (s) => {
                const d = s.val();
                if (d) {
                    FULL_DATA = d;
                    localStorage.setItem('turnosweb_admin_data', JSON.stringify(d));
                    renderBajas();
                }
            });
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains('light-mode');
            setTheme(isLight ? 'dark' : 'light');
        }
        function setTheme(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                $('#themeToggle').textContent = '☀️';
            } else {
                document.body.classList.remove('light-mode');
                $('#themeToggle').textContent = '🌙';
            }
            localStorage.setItem('turnosweb_theme', mode);
        }
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('turnosweb_theme') || 'dark';
            setTheme(savedTheme);

            const today = new Date();
            const endOfYear = new Date(today.getFullYear(), 11, 31);

            flatpickr("#rangeTrigger", {
                wrap: true,
                mode: "range",
                locale: "es",
                dateFormat: "Y-m-d",
                defaultDate: [today, endOfYear],
                onChange: (selectedDates) => {
                    if (selectedDates.length === 2) {
                        const s = selectedDates[0].toISOString().split('T')[0];
                        const e = selectedDates[1].toISOString().split('T')[0];
                        CURRENT_RANGE = { start: s, end: e };
                        $('#rangeLabel').textContent = `${selectedDates[0].toLocaleDateString('es-ES')} — ${selectedDates[1].toLocaleDateString('es-ES')}`;
                        renderBajas();
                    }
                },
                onReady: (selectedDates) => {
                    if (selectedDates.length === 2) {
                        const s = selectedDates[0].toISOString().split('T')[0];
                        const e = selectedDates[1].toISOString().split('T')[0];
                        CURRENT_RANGE = { start: s, end: e };
                        $('#rangeLabel').textContent = `${selectedDates[0].toLocaleDateString('es-ES')} — ${selectedDates[1].toLocaleDateString('es-ES')}`;
                        renderBajas();
                    }
                }
            });

            if (localStorage.getItem('turnosweb_admin_data')) {
                FULL_DATA = JSON.parse(localStorage.getItem('turnosweb_admin_data'));
                renderBajas();
            }
        });
    </script>
</body>
</html>
