<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnosWeb — Cambios de Turno</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="flatpickr.min.css">
</head>
<body class="light-mode">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="Logo.png" alt="Logo" class="sidebar-logo">
            <div class="brand-text">
                <div class="sidebar-title">TurnosWeb</div>
                <div class="sidebar-subtitle">PANEL ADMIN</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-label">CUADRANTE</div>
            <a href="admin.html" class="nav-item">🏠 <span class="nav-label">Inicio / Cargar</span></a>
            <a href="admin.html#preview" class="nav-item">📅 <span class="nav-label">Vista Previa</span></a>
            <a href="admin.html#employees" class="nav-item">👥 <span class="nav-label">Empleados</span></a>
            <div class="nav-group-label">AUSENCIAS</div>
            <a href="vacaciones.html" class="nav-item">🏖️ <span class="nav-label">Vacaciones</span></a>
            <a href="bajas.html" class="nav-item">🏥 <span class="nav-label">Bajas y Permisos</span></a>
            <a href="cambios.html" class="nav-item active">🔄 <span class="nav-label">Cambios de Turno</span></a>
            <div class="nav-group-label">COMUNICACIÓN</div>
            <a href="solicitudes.html" class="nav-item">📩 <span class="nav-label">Solicitudes</span></a>
            <a href="bandeja.html" class="nav-item">📫 <span class="nav-label">Bandeja</span></a>
            <div class="nav-group-label">SISTEMA</div>
            <a href="configuracion.html" class="nav-item">📦 <span class="nav-label">Configuración</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </aside>

    <main class="main-wrap">
        <section class="section active">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Cambios de Turno</h1>
                    <p class="page-subtitle">Historial de permutas procesadas</p>
                </div>
                <div id="syncStatus" class="status-badge-premium" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
                    <span id="syncDot" style="width:8px; height:8px; border-radius:50%; background:#ff9800;"></span>
                    <span id="syncText">Conectando...</span>
                </div>
            </header>
            <div id="swapsBody" class="glass-panel" style="min-height:400px; padding:1.5rem;"></div>
        </section>
    </main>

    <script src="supabase.js"></script>
    <script src="supabase-config.js?v=8.2"></script>
    <script src="supabase-dao.js?v=8.2"></script>
    <script>
        const $ = (s) => document.querySelector(s);
        async function renderSwaps() {
            if (!window.TurnosDB) return;
            const container = $('#swapsBody');
            try {
                // Solo pedimos CT (Cambios de Turno reales). 
                // Las VACACIONES ya no deberían venir con este tipo tras el fix en admin.js
                const data = await window.TurnosDB.fetchTipo('CT');
                
                if (data.length === 0) {
                    container.innerHTML = `<div style="padding:5rem; text-align:center; opacity:0.5;">No hay permutas o cambios de turno registrados.</div>`;
                    return;
                }
                const rows = data.map(s => `
                    <tr>
                        <td style="padding:1rem;"><b>${window.TurnosDB.fmtDateLegacy(s.fecha)}</b></td>
                        <td style="padding:1rem;">${s.hotel_id}</td>
                        <td style="padding:1rem;">
                           <div style="display:flex; align-items:center; gap:10px;">
                             <span>${s.empleado_id}</span>
                             <span style="color:var(--accent); font-weight:bold;">↔</span>
                             <span>${s.sustituto || '<i style="opacity:0.5;">Sin asignar</i>'}</span>
                           </div>
                        </td>
                        <td style="padding:1rem;">${s.turno || '—'}</td>
                    </tr>`).join('');
                container.innerHTML = `<div class="table-container"><table class="preview-table" style="width:100%;"><thead><tr><th>Fecha</th><th>Hotel</th><th>Participantes</th><th>Observaciones (Turno)</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            } catch (err) { container.innerHTML = `Error: ${err.message}`; }
        }

        window.initSupabaseSync = async () => {
            const syncText = $('#syncText');
            const syncDot = $('#syncDot');
            try {
                await renderSwaps();
                if (syncText) syncText.innerText = "Supabase Conectado";
                if (syncDot) syncDot.style.background = "#10e898";
                window.aplicarCambioLocal = renderSwaps;
            } catch (e) { if (syncText) syncText.innerText = "Error"; }
        };

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('turnosweb_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('turnosweb_theme') === 'light') document.body.classList.add('light-mode');
            window.initSupabaseSync();
        });
    </script>
    <script src="sync-status.js"></script>
</body>
</html>
