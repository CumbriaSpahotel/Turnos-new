<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnosWeb — Cambios de Turno</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .nav-item.active { background: var(--accent-dim); color: var(--accent); border-right: 3px solid var(--accent); }
    </style>
</head>
<body class="light-mode">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="Logo.png" alt="Logo" class="sidebar-logo">
            <div class="brand-text">
                <div class="sidebar-title">TurnosWeb</div>
                <div class="sidebar-subtitle">PANEL ADMIN</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group-label">CUADRANTE</div>
            <a href="admin.html" class="nav-item">🏠 <span class="nav-label">Inicio / Cargar</span></a>
            <a href="admin.html#preview" class="nav-item">📅 <span class="nav-label">Vista Previa</span></a>
            <a href="admin.html#employees" class="nav-item">👥 <span class="nav-label">Empleados</span></a>
            <div class="nav-group-label">AUSENCIAS</div>
            <a href="vacaciones.html" class="nav-item">🏖️ <span class="nav-label">Vacaciones</span></a>
            <a href="bajas.html" class="nav-item">🏥 <span class="nav-label">Bajas y Permisos</span></a>
            <a href="cambios.html" class="nav-item active">🔄 <span class="nav-label">Cambios de Turno</span></a>
            <div class="nav-group-label">SISTEMA</div>
            <a href="admin.html#export" class="nav-item">📦 <span class="nav-label">Configuración</span></a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </aside>

    <main class="main-wrap">
        <section class="section active">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Cambios de Turno</h1>
                    <p class="page-subtitle">Historial de permutas procesadas</p>
                </div>
                <div id="syncStatus" class="status-badge-premium" style="margin-left:auto; display:flex; align-items:center; gap:8px;">
                    <span id="syncDot" style="width:8px; height:8px; border-radius:50%; background:#ff9800;"></span>
                    <span id="syncText">Conectando...</span>
                </div>
            </header>
            <div id="swapsBody" class="glass-panel" style="min-height:400px; padding:1.5rem;">
                <!-- Dinámico -->
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=7.5"></script>
    <script src="supabase-dao.js?v=7.5"></script>
    <script>
        const $ = (s) => document.querySelector(s);
        
        function fmtDate(d) {
            if (!d) return '—';
            const parts = d.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        async function renderSwaps() {
            if (!window.TurnosDB) return;
            const container = $('#swapsBody');
            
            try {
                const data = await window.TurnosDB.fetchTipo('CT');
                if (data.length === 0) {
                    container.innerHTML = `<div style="padding:5rem; text-align:center; opacity:0.5;">No hay cambios de turno registrados.</div>`;
                    return;
                }

                data.sort((a,b) => b.fecha.localeCompare(a.fecha));

                const rows = data.map(s => `
                    <tr>
                        <td style="padding:1rem;"><span class="status-badge" style="background:rgba(16,232,152,0.1); color:#10e898; border:none; padding:4px 10px; border-radius:20px; font-size:0.7rem;">PROCESADO</span></td>
                        <td style="padding:1rem;"><b>${fmtDate(s.fecha)}</b></td>
                        <td style="padding:1rem;">${s.hotel_id}</td>
                        <td style="padding:1rem;">
                            <b>${s.empleado_id}</b> <span style="color:var(--accent);">↔</span> <b>${s.sustituto || '—'}</b>
                        </td>
                        <td style="padding:1rem; color:var(--text-muted); font-size:0.85rem;">${s.turno || 'Sin observaciones'}</td>
                    </tr>
                `).join('');

                container.innerHTML = `
                    <div class="table-container">
                        <table class="preview-table" style="width:100%;">
                            <thead>
                                <tr>
                                    <th style="text-align:left;">Estado</th>
                                    <th style="text-align:left;">Fecha</th>
                                    <th style="text-align:left;">Hotel</th>
                                    <th style="text-align:left;">Participantes</th>
                                    <th style="text-align:left;">Motivo / Observaciones</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div style="padding:2rem; color:red;">Error: ${err.message}</div>`;
            }
        }

        window.initSupabaseSync = async () => {
            const syncText = $('#syncText');
            const syncDot = $('#syncDot');
            try {
                await renderSwaps();
                if (syncText) syncText.innerText = "Supabase Conectado";
                if (syncDot) syncDot.style.background = "#10e898";
            } catch (e) {
                if (syncText) syncText.innerText = "Error Conexión";
            }
        };

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('turnosweb_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('turnosweb_theme') === 'light') document.body.classList.add('light-mode');
            window.initSupabaseSync();
        });
    </script>
</body>
</html>
