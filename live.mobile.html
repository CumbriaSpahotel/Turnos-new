<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Turnos · Versión Móvil</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #3b82f6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --glass: rgba(255, 255, 255, 0.8);
      
      --pill-m: #dcfce7; --pill-m-text: #166534;
      --pill-t: #e0f2fe; --pill-t-text: #075985;
      --pill-n: #f1f5f9; --pill-n-text: #334155;
      --pill-d: #fee2e2; --pill-d-text: #991b1b;
      --pill-v: #fef9c3; --pill-v-text: #854d0e;
    }

    body.dark-mode {
      --bg: #020617;
      --card: #0f172a;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #1e293b;
      --glass: rgba(15, 23, 42, 0.8);
      
      --pill-m: rgba(34, 197, 94, 0.15); --pill-m-text: #4ade80;
      --pill-t: rgba(59, 130, 246, 0.15); --pill-t-text: #60a5fa;
      --pill-n: rgba(148, 163, 184, 0.15); --pill-n-text: #cbd5e1;
      --pill-d: rgba(239, 68, 68, 0.15); --pill-d-text: #f87171;
      --pill-v: rgba(234, 179, 8, 0.15); --pill-v-text: #facc15;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }

    .header-bar {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .theme-toggle {
        background: var(--bg);
        border: 1px solid var(--border);
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        cursor: pointer;
    }

    .controls-scroller {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .controls-scroller::-webkit-scrollbar { display: none; }

    .control-item {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .control-item select, .control-item input {
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-weight: 800;
      outline: none;
    }

    .btn-action {
      background: var(--primary);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    main {
      padding: 16px;
      padding-bottom: 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hotel-card {
      background: var(--card);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }

    .hotel-info {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }

    .hotel-info img { height: 20px; width: auto; }
    .hotel-info h2 { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800; margin: 0; }

    .table-wrapper {
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .table-wrapper::-webkit-scrollbar { display: none; }

    .grid-head {
      display: grid;
      grid-template-columns: 110px repeat(7, 72px);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .grid-th {
      padding: 10px 8px;
      font-size: 0.6rem;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .grid-row {
      display: grid;
      grid-template-columns: 110px repeat(7, 72px);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .grid-row:last-child { border-bottom: none; }

    .name-sticky {
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 800;
      position: sticky;
      left: 0;
      background: var(--card);
      z-index: 10;
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .name-sticky .stats { font-size: 0.6rem; color: var(--muted); margin-top: 2px; font-weight: 600; }

    .grid-cell {
      padding: 8px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      border-right: 1px solid var(--border);
    }
    .grid-cell:last-child { border-right: none; }

    .badge-shift {
      font-size: 0.7rem;
      font-weight: 800;
      padding: 6px 8px;
      border-radius: 10px;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .m { background: var(--pill-m); color: var(--pill-m-text); }
    .t { background: var(--pill-t); color: var(--pill-t-text); }
    .n { background: var(--pill-n); color: var(--pill-n-text); }
    .d { background: var(--pill-d); color: var(--pill-d-text); }
    .v { background: var(--pill-v); color: var(--pill-v-text); }

    #corsAlert {
      background: #fef2f2;
      color: #991b1b;
      padding: 14px;
      border-radius: 16px;
      font-size: 0.75rem;
      margin-bottom: 16px;
      border: 1px solid #fee2e2;
      display: none;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }
    
    body.dark-mode #corsAlert {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-bar">
      <div class="header-top">
        <div class="brand">
          <img src="icons/icon-192.png" alt="Logo">
          <h1>Turnos <span style="color:var(--primary)">Live</span></h1>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      </div>

      <div class="controls-scroller">
        <div class="control-item">
          <select id="hotelSelect" onchange="refreshMobileView()">
            <option value="">Hoteles</option>
          </select>
        </div>
        <div class="control-item">
          <input type="date" id="dateInput" onchange="refreshMobileView()">
        </div>
        <button class="btn-action" onclick="changeWeek(-1)">←</button>
        <button class="btn-action" onclick="changeWeek(1)">→</button>
      </div>
    </div>
  </header>

  <main>
    <div id="corsAlert">
      <span>⚠️</span>
      <div><b>Modo Local:</b> El orden de Excel está desactivado por límites del navegador (CORS).</div>
    </div>

    <div id="shiftGrid">
      <div style="padding:40px; text-align:center; opacity:0.5">Cargando cuadrante...</div>
    </div>
  </main>

  <script src="supabase.js"></script>
  <script src="localforage.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="supabase-config.js?v=9.7"></script>
  <script src="supabase-dao.js?v=9.7"></script>
  <script src="plantilla_mobile_adapter.js?v=9.7"></script>
  <script src="mobile.app.js?v=9.8"></script>

  <script>
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('mobile-theme', isDark ? 'dark' : 'light');
    }

    if (localStorage.getItem('mobile-theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('themeBtn').innerText = '☀️';
    }

    if (window.location.protocol === 'file:') {
        document.getElementById('corsAlert').style.display = 'flex';
    }

    window.addEventListener('load', () => {
        if (typeof window.initMobileSunc === 'function') {
            window.initMobileSunc();
        }
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Fail:", err));
    }
  </script>
</body>
</html>
